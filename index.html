<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--p:#3730a3;--pl:#4f46e5;--pp:#eef2ff;--red:#dc2626;--amb:#d97706;--em:#059669;--cy:#0891b2;--vi:#7c3aed;--bg:#f4f5f7;--cd:#fff;--bd:#e2e4e9;--bl:#f0f1f3;--tx:#1a1d26;--t2:#5c6070;--t3:#9196a6;--mo:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx)}
body{display:flex}
.sb{width:240px;min-width:240px;height:100vh;background:var(--cd);border-right:1px solid var(--bd);display:flex;flex-direction:column}
.sbh{padding:18px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--bl)}
.logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(140deg,var(--p),var(--pl));display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px #3730a340;flex-shrink:0}
.logo svg{width:18px;height:18px}
.ltitle{font-size:15px;font-weight:800;letter-spacing:-.02em}.ltitle b{color:var(--p)}.lsub{font-size:9.5px;color:var(--t3);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.sb nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;min-height:0}
/* Regional legal disclaimer pinned to the bottom of the sidebar (flexbox mt-auto pattern) */
#sidebar-legal-footer{margin-top:auto;flex-shrink:0;border-top:1px solid var(--bd);padding:13px 16px}
#sidebar-legal-footer a{font-size:12px;color:var(--t3);text-decoration:none;transition:color .15s}
#sidebar-legal-footer a:hover{color:var(--t2)}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:none;cursor:pointer;background:transparent;color:var(--t2);font:500 13px 'Plus Jakarta Sans',sans-serif;width:100%;text-align:left;transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;position:relative}
.nav-btn:hover{transform:translateX(2px) scale(1.02);box-shadow:0 2px 10px rgba(0,0,0,.06)}
.nav-btn:active{transform:scale(.97);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.nav-btn.active{background:rgba(55,48,163,.06);color:var(--p);font-weight:700}
.nav-btn.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:2px;background:var(--p)}
.nav-btn svg{width:18px;height:18px;flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:48px;min-height:48px;background:var(--cd);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 24px}
.status{margin-left:auto;display:flex;align-items:center;gap:6px;font:600 11.5px 'Plus Jakarta Sans';color:var(--em);background:rgba(5,150,105,.06);padding:4px 14px;border-radius:20px}
.status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--em)}
.content{flex:1;overflow-y:auto;padding:28px 32px 52px}
.content>div{max-width:1060px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
h1{font-size:24px;font-weight:800;letter-spacing:-.03em;margin-bottom:2px}
.desc{font-size:13.5px;color:var(--t2);margin-bottom:24px}
.grid{display:grid;gap:14px}
/* minmax(0,1fr) (not 1fr=minmax(auto,1fr)) so a wide card can't force the track — and every card — past the viewport */
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g5{grid-template-columns:repeat(5,minmax(0,1fr))}
.grid>*{min-width:0}
/* prize-pill grid: 5 per row by default, drops to fewer only when space is tight (never overflows — minmax(0,1fr) shrinks cells) */
.przgrid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px}
@media(max-width:440px){.przgrid{grid-template-columns:repeat(4,minmax(0,1fr))}}
@media(max-width:340px){.przgrid{grid-template-columns:repeat(3,minmax(0,1fr))}}
.card{background:var(--cd);border-radius:12px;padding:22px;border:1px solid var(--bd);min-width:0;overflow-wrap:break-word}
/* result-grid cards stretch to equal height + lay out as columns so the Next-Draw footer aligns at the bottom */
.grid.g2>.card,.grid.g3>.card{display:flex;flex-direction:column}
.ball{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:700;font-family:var(--mo);flex-shrink:0;animation:popIn .35s cubic-bezier(.34,1.56,.64,1) both}
.section-title{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.section-title .dot{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center}
.section-title .dot svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.section-title h3{font-size:14px;font-weight:700;margin:0}
.section-title small{font-size:11px;color:var(--t3);display:block}
.stat-card{background:var(--cd);border-radius:12px;padding:18px 20px;border:1px solid var(--bd);position:relative;overflow:hidden}
.stat-val{font-size:22px;font-weight:800;font-family:var(--mo);letter-spacing:-.03em}
.stat-sub{margin-top:4px;font-size:11.5px;color:var(--em);font-weight:600}
.pbar{display:flex;align-items:center;gap:9px;margin-bottom:5px}
.pbar-label{font-size:12px;color:var(--t2);font-weight:600;min-width:28px;font-family:var(--mo)}
.pbar-track{flex:1;height:6px;border-radius:3px;background:var(--bl);overflow:hidden}
.pbar-fill{height:100%;border-radius:3px}
.pbar-pct{font-size:11px;color:var(--t3);font-weight:600;min-width:32px;text-align:right}
.meter{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bl)}
.meter:last-child{border-bottom:none}
.meter-rank{font-size:18px;font-weight:800;color:var(--t3);width:34px;text-align:right;font-family:var(--mo)}
.meter-bar{position:relative;flex:1;height:28px;border-radius:6px;background:var(--bg);overflow:hidden}
.meter-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px}
.meter-num{position:relative;z-index:1;font:700 13.5px var(--mo);color:var(--tx);padding-left:10px;line-height:28px}
.meter-end{text-align:right;min-width:58px}
.meter-end b{font-size:12.5px;display:block}.meter-end small{font-size:10px;color:var(--t3)}
.numgrid{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
.ncell{display:flex;flex-direction:column;align-items:center;padding:6px 2px;border-radius:8px}
.ncell b{font-size:13.5px;font-weight:800;font-family:var(--mo)}.ncell small{font-size:9px;color:var(--t3);font-weight:600}
.hero{background:linear-gradient(140deg,var(--p),var(--pl),#818cf8);border-radius:12px;padding:28px;color:#fff;position:relative;overflow:hidden;margin-bottom:20px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;height:36px;padding:0 18px;border-radius:8px;border:1px solid var(--bd);background:var(--cd);color:var(--t2);font:600 13px 'Plus Jakarta Sans';cursor:pointer;box-sizing:border-box;transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.10)}
.btn:active{transform:translateY(0) scale(.96);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.btn-p{background:var(--p);color:#fff;border-color:var(--p)}
.btn-p:hover{box-shadow:0 6px 16px rgba(55,48,163,.28)}
.tab{padding:6px 16px;border-radius:7px;border:none;cursor:pointer;font:600 12.5px 'Plus Jakarta Sans';text-transform:uppercase;background:var(--bg);color:var(--t3);transition:transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s}
.tab:hover{transform:translateY(-1px) scale(1.03);box-shadow:0 3px 8px rgba(0,0,0,.08)}
.tab:active{transform:scale(.95);box-shadow:0 1px 2px rgba(0,0,0,.1)}
.tab.active{background:var(--p);color:#fff}
.tab.active:hover{box-shadow:0 4px 10px rgba(55,48,163,.28)}
input[type=text],input[type=date],input[type=time],input[type=number]{padding:9px 14px;border-radius:8px;border:1px solid var(--bd);font:13px 'Plus Jakarta Sans';outline:none;background:var(--cd);color:var(--tx);height:36px;line-height:1;box-sizing:border-box}
input:focus{border-color:var(--p)}
input::placeholder{font-size:15px;opacity:.55;font-weight:500}
input[type=number]::placeholder{font-size:15px}
.tool-card{cursor:pointer;transition:all .2s}.tool-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.06)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--bl);border-top-color:var(--p);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-step{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;font-size:13px;color:var(--t2);opacity:.4;transition:all .3s;background:var(--bg)}
.load-step.active{opacity:1;background:var(--pp);color:var(--p);font-weight:600}
.load-step.done{opacity:.85;color:var(--em)}
.load-step .mark{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;flex-shrink:0}
.daily-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;background:var(--bg);border:1px solid var(--bd)}
.daily-card .ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.daily-card .lab{font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.daily-card .val{font-size:14px;font-weight:700;color:var(--tx);margin-top:1px}
.color-swatch{width:22px;height:22px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--bd),inset 0 1px 2px rgba(0,0,0,.1);flex-shrink:0}
.lang-toggle .tab{padding:5px 11px;font-size:11px}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* ─── Mobile menu toggle (hidden on desktop) ─── */
.menu-tog{display:none;align-items:center;gap:6px;background:var(--pp);border:1px solid #c7d2fe;cursor:pointer;padding:6px 10px 6px 8px;margin-right:6px;color:var(--p);border-radius:8px;transition:all .15s;font:700 11px 'Plus Jakarta Sans',sans-serif;letter-spacing:.04em}
.menu-tog:hover,.menu-tog:active{background:#dde3ff;transform:scale(.97)}
.menu-tog svg{width:18px;height:18px;display:block;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;fill:none}
.menu-tog .lbl{display:inline-block}
/* Attention pulse on first load — fades after 4s via JS-removed class */
.menu-tog.attn{animation:menuPulse 1.4s ease-in-out infinite;box-shadow:0 0 0 0 rgba(55,48,163,.45)}
@keyframes menuPulse{
  0%   {box-shadow:0 0 0 0   rgba(55,48,163,.55)}
  70%  {box-shadow:0 0 0 12px rgba(55,48,163,0)}
  100% {box-shadow:0 0 0 0   rgba(55,48,163,0)}
}

/* ─── Sidebar backdrop overlay (mobile only) ─── */
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;animation:fadeIn .2s}

/* ───────── Tablet & smaller (≤ 768px) ───────── */
@media (max-width:768px){
  html,body{overflow-x:hidden}
  body{display:block}

  /* Sidebar becomes a slide-in drawer */
  .sb{position:fixed;top:0;left:0;bottom:0;width:260px;min-width:260px;transform:translateX(-100%);transition:transform .25s ease;z-index:100;will-change:transform}
  .sb.open{transform:translateX(0);box-shadow:4px 0 30px rgba(0,0,0,.18)}
  .sb-backdrop.show{display:block}

  /* Main content takes full viewport */
  .main{width:100%;height:100vh;height:100dvh}

  /* Show hamburger */
  .menu-tog{display:flex;align-items:center;justify-content:center}

  /* Tighten topbar */
  .topbar{padding:0 10px;height:52px;min-height:52px}
  .lang-toggle{margin-right:6px !important}
  .lang-toggle .tab{padding:4px 9px;font-size:10.5px}
  .status{padding:3px 9px;font-size:10.5px}

  /* Roomier content area but with sane padding */
  .content{padding:18px 14px 36px}
  .content>div{max-width:100%}

  /* Force all hard-coded multi-column grids to stack */
  .grid.g2,.grid.g3,.grid.g4{grid-template-columns:minmax(0,1fr) !important}
  .grid.g5{grid-template-columns:repeat(2,minmax(0,1fr)) !important}

  /* Cards a bit tighter */
  .card{padding:18px 16px;border-radius:11px}
  h1{font-size:21px}
  .desc{font-size:13px;margin-bottom:16px}
}

/* ───────── Phones (≤ 480px) — even tighter ───────── */
@media (max-width:480px){
  .content{padding:14px 11px 32px}
  .card{padding:16px 13px}
  h1{font-size:19.5px;letter-spacing:-.02em}
  .desc{font-size:12.5px}
  .topbar{padding:0 8px}
  .status{padding:3px 8px;font-size:10px}
  .lang-toggle .tab{padding:3px 8px;font-size:10px}

  /* 49-number grid → 7 cols instead of 10 (each cell is more tappable) */
  .numgrid{grid-template-columns:repeat(7,1fr) !important}

  /* 5-column 4D prize pill grids → 3 cols on phones (4-digit numbers stay legible) */
  [style*="grid-template-columns:repeat(5,1fr)"]{grid-template-columns:repeat(3,1fr) !important}

  /* 7-day calendar bias grids → 4 cols (week wraps to 2 rows) */
  [style*="grid-template-columns:repeat(7,1fr)"]{grid-template-columns:repeat(4,1fr) !important}

  /* 12-column month grids → 4 cols */
  [style*="grid-template-columns:repeat(12,1fr)"]{grid-template-columns:repeat(4,1fr) !important}
}

<script>
// ═══ DWELL-TIME TRACKING ═════════════════════════════════════
// Measures how long visitors spend on each tab + their full session.
// Sent as a single beacon on pagehide / visibilitychange→hidden so it
// reliably fires even when the user closes the tab. Capped client-side
// so an open-and-forgotten tab can't skew averages.
var __DWELL = {
  sessionStart: Date.now(),
  tabStart:     Date.now(),
  currentTab:   null,           // set after currentTab init below
  tabTimes:     {},             // { tabName: totalMs }
  sent:         false,          // beacon is idempotent — only send once
};
function __dwellAccumulate() {
  var tab = __DWELL.currentTab;
  if (!tab) return;
  var dt = Date.now() - __DWELL.tabStart;
  if (dt < 200 || dt > 1800000) { __DWELL.tabStart = Date.now(); return; }
  __DWELL.tabTimes[tab] = (__DWELL.tabTimes[tab] || 0) + dt;
  __DWELL.tabStart = Date.now();
}
function __dwellOnTabSwitch(newTab) {
  __dwellAccumulate();
  __DWELL.currentTab = newTab;
}
function __dwellBeacon() {
  if (__DWELL.sent) return;
  __dwellAccumulate();
  var payload = {
    sessionMs: Math.min(Date.now() - __DWELL.sessionStart, 7200000),
    tabs: __DWELL.tabTimes,
  };
  // Skip empty / instant-bounce sessions
  if (payload.sessionMs < 500) return;
  __DWELL.sent = true;
  try {
    var body = JSON.stringify(payload);
    var blob = new Blob([body], { type: "application/json" });
    if (navigator.sendBeacon) {
      navigator.sendBeacon("/api/lab/dwell", blob);
    } else {
      // Fallback for old browsers — fire-and-forget fetch with keepalive
      fetch("/api/lab/dwell", { method: "POST", body: body,
        headers: { "Content-Type": "application/json" }, keepalive: true });
    }
  } catch (e) { /* never let analytics break the page */ }
}
window.addEventListener("pagehide", __dwellBeacon);
document.addEventListener("visibilitychange", function () {
  if (document.visibilityState === "hidden") __dwellBeacon();
});

// Slides the sidebar in/out on small viewports. Pass true/false to force a
// state, or call with no args to toggle. The backdrop closes on click.
function toggleSb(open) {
  var sb = document.querySelector('.sb');
  var bd = document.getElementById('sbBackdrop');
  var tog = document.getElementById('menuTog');
  if (!sb || !bd) return;
  if (typeof open === 'undefined') open = !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  bd.classList.toggle('show', open);
  // Once user opens the drawer at least once, kill the pulse for good
  if (open && tog) {
    tog.classList.remove('attn');
    try { localStorage.setItem('huat_menu_seen', '1'); } catch(e){}
  }
}

document.addEventListener('keydown', function(e){

});
// First-visit attention pulse: only show if user has never opened the menu.
// Auto-stops after 4 seconds even if untouched, so it never becomes annoying.
(function(){
  var tog = document.getElementById('menuTog');
  if (!tog) return;
  var seen = false;
  try { seen = localStorage.getItem('huat_menu_seen') === '1'; } catch(e){}

    tog.classList.remove('attn');
  } else {
    setTimeout(function(){ tog.classList.remove('attn'); }, 4000);

})();

function makeBall(n, size, color, delay) {

// Returns the localized 3-letter day name for an ISO date like 2026-06-11.
// Uses common.dow.* keys which already exist in en.json + zh.json so EN gives
// "Wed" and 中文 gives "周三". Returns '' on bad input — never throws.
// Site-wide date display format: ISO 'YYYY-MM-DD' → 'DD-MM-YYYY'. Pass-through
// for anything that isn't a plain ISO date (already-formatted, null, etc).
function fmtDate(iso) {
  if (!iso || typeof iso !== 'string') return iso || '';
  var m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  return m ? m[3] + '-' + m[2] + '-' + m[1] : iso;
}
// Draw date + day-of-week pill — one consistent style for every result card.
function dateDayPill(iso, color) {
  if (!iso) return '';
  return '<div style="font-size:16px;color:var(--t2);font-weight:600;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:12px"><span>'+fmtDate(iso)+'</span><span style="font-size:12.5px;font-weight:700;color:'+color+';background:color-mix(in srgb, '+color+' 10%, transparent);padding:2px 9px;border-radius:5px;letter-spacing:.02em">'+dayOfWeek(iso)+'</span></div>';
}
function dayOfWeek(iso) {
  if (!iso) return '';
  var d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return '';
  var keys = ['sun','mon','tue','wed','thu','fri','sat'];
  var k = keys[d.getDay()];
  return L('common.dow.' + k, k.charAt(0).toUpperCase() + k.slice(1));
}
// "how many of those top-3 hits were on THIS draw's weekday" — a subtle chip.
// Highlighted when >0 (day-of-week luck), muted "0×" when it never hit on this day.
function dowChip(dowCount, dayName){
  var on = dowCount > 0;
  return '<div style="margin-left:12px;font-size:11px;font-weight:700;font-family:var(--mo);padding:2px 8px;border-radius:5px;'+
    (on ? 'color:var(--amb);background:#d9770614' : 'color:var(--t3);background:var(--bg)')+'">'+
    dowCount+'× '+L('dashboard.onDay','on')+' '+dayName+'</div>';
}

function L(path, fallback) {

  return o;
}

// ─── Lazy-load helper: fire fn() the first time elementId is on-screen ──
// Drops the 8–15 simultaneous fetches per tab to just the visible ones.
// Subsequent scrolls trigger off-screen cards as the user reaches them.
window.__lazyObs = null;
window.__lazyPending = {};
// In-memory API cache — skip re-fetching heavy endpoints when re-visiting a tab
var __apiCache = {};
function fetchJSON(url, ttlMs) {
  ttlMs = ttlMs || 300000;                       // 5 min default
  var c = __apiCache[url];
  if (c && (Date.now() - c.t) < ttlMs) return Promise.resolve(c.v);
  return fetch(url).then(function(r){ return r.json(); }).then(function(j){
    __apiCache[url] = { t: Date.now(), v: j };
    return j;
  });
}
function lazyLoad(elementId, fn) {
  if (!window.IntersectionObserver) {
    // Fallback: load immediately on browsers without IntersectionObserver
    setTimeout(fn, 50);
    return;
  }
  if (!window.__lazyObs) {
    window.__lazyObs = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if (!entry.isIntersecting) return;
        var id = entry.target.id;
        var pending = window.__lazyPending[id];
        if (pending) {
          delete window.__lazyPending[id];
          window.__lazyObs.unobserve(entry.target);
          pending();
        }
      });
    }, { rootMargin: '300px 0px' }); // start fetching 300px before scroll reaches
  }
  // Poll for the element existing (renderPage may not have flushed DOM yet)
  var tries = 0;
  (function attach() {
    var el = document.getElementById(elementId);
    if (el) {
      // Already in/near the viewport → fire now (observers don't reliably emit for initially-visible elements)
      var r = el.getBoundingClientRect();
      if (r.top < (window.innerHeight || 800) + 300 && r.bottom > -300) { return fn(); }
      window.__lazyPending[elementId] = fn;
      window.__lazyObs.observe(el);
      return;
    }
    if (++tries < 30) setTimeout(attach, 30);
  })();
}
// Reset observer when switching tabs — avoid stale targets
function resetLazyObserver() {
  if (window.__lazyObs) { try { window.__lazyObs.disconnect(); } catch (e) {} }
  window.__lazyObs = null;
  window.__lazyPending = {};
}

    h += '</div></div>';
  });

  // 1b ── Top 10 Cold 4D Numbers (least frequent) — brought up right below Hot
  var _cold = s.cold_numbers || [];

    h += '<div class="card" style="margin-bottom:28px;padding:24px">'+secHead("snow","var(--cy)","#0891b211",L('fourd.top10Cold','Top 10 Cold 4D Numbers'));

    _cold.forEach(function(x,i){ var b=x.breakdown||{};
      h += '<div style="background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:12px 14px">';

      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px">';
      [['1st',b.first,'var(--em)'],['2nd',b.second,'var(--t2)'],['3rd',b.third,'var(--amb)'],['St',b.special,'var(--p)'],['Co',b.consol,'var(--vi)']].forEach(function(t){ if(t[1]) h+='<span style="font-size:10.5px;font-family:var(--mo);font-weight:700;color:'+t[2]+';background:var(--cd);border:1px solid var(--bd);padding:1px 6px;border-radius:4px">'+t[0]+':'+t[1]+'</span>'; });

  if (s.repeat_winners && s.repeat_winners.length){
    h += '<p style="font-size:13px;color:var(--t2);margin:0 0 14px">'+s.repeat_winners.length+' '+L('fourd.repeatWinnersMy','numbers have won 1st prize more than once.')+'</p>';
    h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:10px">';
    s.repeat_winners.slice(0,10).forEach(function(x){ h+='<div style="background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:12px;text-align:center"><div style="font-family:var(--mo);font-size:21px;font-weight:800;color:var(--amb)">'+x.number+'</div><div style="font-size:11px;color:var(--t3);font-weight:600;margin-top:3px">'+L('common.won','won')+' '+x.wins+' '+L('common.times','times')+'</div></div>'; });
    h += '</div>';
  } else h += '<div style="color:var(--t3);font-size:13px">'+L('fourd.noRepeat','No number has won 1st prize more than once yet.')+'</div>';
  h += '</div>';

  // 3 ── Year-by-Year Winners
  h += '<div class="card" style="margin-bottom:28px;padding:24px">'+secHead("cal","var(--amb)","#d9770611",L('fourd.yearlyWinners','Year-by-Year Winners'));

  });
  h += '</div></div>';

  // 4 ── Digit Frequency — Single, Double, Triple, Quad (all Top-3 / Bottom-3)
  h += '<div class="card" style="margin-bottom:28px;padding:24px">'+secHead("chart","var(--p)","#3730a311",L('fourd.digitFreq','Digit Frequency — Single, Double, Triple, Quad'));
  h += '<p style="font-size:13px;color:var(--t2);margin:0 0 14px">'+L('fourd.digitFreqMyDesc','How often each digit pattern appears across all 23 prize positions per draw. <b>Total</b> (top-right) = that category’s occurrences; each <b>%</b> is the item’s share of its own category — e.g. 44 vs all doubles (uniform ≈ 10% each).')+'</p>';
  var dp = s.digit_pairs || {};
  var _singleTotal = s.digit_frequency.reduce(function(a,x){ return a + x.count; }, 0);
  // % = item's share of its OWN category total (44 vs all doubles, 111 vs all triples, etc.)
  function withPct(obj, catTotal){ if(!obj) return null; function m(a){ return (a||[]).map(function(x){ return { number:x.number, pct: catTotal ? x.count/catTotal*100 : 0 }; }); } return { top:m(obj.top), bottom:m(obj.bottom), total: catTotal || 0 }; }
  var _sg = s.digit_frequency.slice().sort(function(a,b){return b.count-a.count;});
  var singleTB = { top:_sg.slice(0,3).map(function(x){return {number:x.digit,count:x.count};}), bottom:_sg.slice(-3).reverse().map(function(x){return {number:x.digit,count:x.count};}) };

    obj.top.forEach(function(x){ c+=line(x,true); });
    c+='<div style="font-size:9.5px;color:var(--t3);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin:9px 0 1px">'+L('stats.bottom3','Bottom 3')+'</div>';
    obj.bottom.forEach(function(x){ c+=line(x,false); });
    return c+'</div>';
  }
  h += '<div class="grid g4" style="gap:12px">';
  h += pairCol(L('stats.single','Single')+' (X)', withPct(singleTB, _singleTotal), 'var(--em)');
  h += pairCol(L('stats.doubles','Doubles')+' (XX)', withPct(dp.doubles, dp.doubles && dp.doubles.total), 'var(--amb)');
  h += pairCol(L('stats.triples','Triples')+' (XXX)', withPct(dp.triples, dp.triples && dp.triples.total), 'var(--vi)');
  h += pairCol(L('stats.quads','Quads')+' (XXXX)', withPct(dp.quads, dp.quads && dp.quads.total), 'var(--red)');
  h += '</div></div>';

  // 5 ── Most Overdue (bonus — MY has deep history)
  h += '<div class="card" style="margin-bottom:28px;padding:24px">'+secHead("snow","var(--cy)","#0891b211",L('stats.overdue','Most Overdue'));
  h += '<p style="font-size:13px;color:var(--t2);margin:0 0 14px">'+L('fourd.overdueDesc','Numbers with the longest gap since their last appearance in any prize position.')+'</p>';
  h += '<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:12px">';

  h += '</div></div>';
  return h;
}

window.loadDatePattern = function() {
  var dv = document.getElementById('datePatternD').value;
  if (!dv) { alert('Pick a date'); return; }
  var md = dv.slice(5);    // YYYY-MM-DD → MM-DD
  var out = document.getElementById('datePatternResult');
  out.innerHTML = loadingCard();
  fetch('/api/toto/date-pattern?month_day=' + md).then(r=>r.json()).then(function(j) {
    if (!j.success) { out.innerHTML = 'Error: '+(j.error||''); return; }
    var d = j.data;
    var html = '';
    html += '<div style="font-size:13px;color:var(--t2);margin-bottom:14px;padding:10px 14px;background:var(--bg);border-radius:6px">';
    html += '<b>'+md+'</b> across all years &nbsp;·&nbsp; <b>'+d.draws_on_date+' TOTO draws</b> happened on this date';
    if (d.draws_on_date < 5) {
      html += ' <span style="color:var(--red)">— too few draws for meaningful patterns</span>';
    }
    html += '</div>';
    if (d.draws_on_date === 0) {
      html += '<p style="font-size:12.5px;color:var(--t3)">No TOTO draws on this date in our archive.</p>';
    } else {
      html += '<div class="grid g2" style="gap:18px">';
      [['Most often on this date', d.top_numbers, 'var(--red)'],
       ['Least often on this date', d.bottom_numbers, 'var(--cy)']
      ].forEach(function(sec) {
        html += '<div><div style="font-size:12px;font-weight:800;color:'+sec[2]+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+sec[0]+'</div>';
        html += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
        sec[1].forEach(function(n){
          html += '<div style="display:flex;flex-direction:column;align-items:center;gap:4px">'+
            makeBall(n.number, 36, sec[2], 0)+
            '<span style="font-size:11px;color:var(--t3);font-weight:600;font-family:var(--mo)">'+n.count+'×</span>'+
            '</div>';
        });
        html += '</div></div>';
      });
      html += '</div>';
    }
    out.innerHTML = html;
  });
};

      html += '</div>';
      html += '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:18px">';
      d.by_dow.forEach(function(x) {
        var pct = maxDow > 0 ? x.count / maxDow * 100 : 0;
        var isBest = bestDow === x.day && x.count > 0;
        var barCol = isBest ? 'var(--vi)' : (x.count === 0 ? 'var(--bd)' : 'var(--p)');
        html += '<div style="display:flex;align-items:center;gap:10px">';
        html += '<div style="font-size:12px;font-weight:'+(isBest?800:600)+';color:'+(isBest?'var(--vi)':'var(--t2)')+';min-width:50px">'+x.day+'</div>';
        html += '<div style="flex:1;height:16px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+barCol+';border-radius:4px"></div></div>';
        html += '<div style="font-family:var(--mo);font-size:12.5px;font-weight:700;color:'+(isBest?'var(--vi)':'var(--t2)')+';min-width:40px;text-align:right">'+x.count+'×</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    // Best month pill (kept compact)
    if (d.best_month) {
      html += '<div style="padding:14px;background:rgba(220,38,38,.08);border-radius:8px;margin-bottom:18px"><div style="font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Best Month</div><div style="font-size:18px;font-weight:800;color:var(--red)">'+d.best_month.name+' &nbsp;<span style="font-size:13px;color:var(--t2);font-weight:600">('+d.best_month.count+'×)</span></div></div>';
    }
    // Yearly breakdown
    if (d.by_year && d.by_year.length) {
      var maxYear = Math.max.apply(null, d.by_year.map(y=>y.count));
      html += '<div style="font-size:12px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Yearly breakdown</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px">';
      d.by_year.forEach(function(y) {
        var pct = maxYear > 0 ? y.count / maxYear * 100 : 0;
        html += '<div style="padding:8px 10px;background:var(--bg);border-radius:6px">';
        html += '<div style="font-size:12px;font-weight:700;color:var(--tx)">'+y.year+'</div>';
        html += '<div style="height:8px;background:var(--bl);border-radius:3px;overflow:hidden;margin:4px 0"><div style="height:100%;width:'+pct+'%;background:var(--p);border-radius:3px"></div></div>';
        html += '<div style="font-size:12px;color:var(--t2);font-weight:600">'+y.count+'×</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    out.innerHTML = html;
  });
};



function loadClassByYear() {
  var el = document.getElementById('classByYear'); if (!el) return;
  fetch('/api/fourd/class-by-year?operator='+alphaOp).then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var overall = j.data.overall;

    // Render one digit-frequency column — % is each item's share of its OWN category total
    function digitTable(map, total, fmt) {
      var arr = [];
      for (var d = 0; d <= 9; d++) arr.push({ d: d, c: map[d].count, p: total ? map[d].count/total*100 : 0 });
      arr.sort(function(a,b){ return b.c - a.c; });
      function line(x, up){ return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:4px 0"><span style="font-family:var(--mo);font-size:17px;font-weight:800;color:var(--tx)">'+fmt(x.d)+'</span><span style="font-size:12.5px;color:'+(up?'#dc2626':'#0891b2')+';font-weight:700;font-family:var(--mo)">'+x.p.toFixed(1)+'%</span></div>'; }
      var html = '<div style="font-size:9.5px;color:var(--t3);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px">'+L('stats.top3','Top 3')+'</div>';
      arr.slice(0,3).forEach(function(x){ html += line(x, true); });
      html += '<div style="font-size:9.5px;color:var(--t3);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin:9px 0 1px">'+L('stats.bottom3','Bottom 3')+'</div>';
      arr.slice(-3).reverse().forEach(function(x){ html += line(x, false); });
      return html;
    }

    // === Digit Frequency — same layout as the Malaysia stats (g4 pairCol cards) ===
    function digitCol(title, color, map, fmt){
      var total = 0; for (var d = 0; d <= 9; d++) total += map[d].count;
      var head = '<div style="display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px"><div style="font-size:16px;font-weight:800;color:'+color+'">'+title+'</div><div style="font-size:11px;color:var(--t3);font-family:var(--mo);font-weight:700">'+total.toLocaleString()+' '+L('stats.total','total')+'</div></div>';
      return '<div style="background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:16px">'+head+digitTable(map, total, fmt)+'</div>';
    }
    var html = '<p style="font-size:12.5px;color:var(--t2);font-family:var(--mo);margin:-4px 0 14px">'+overall.year_range.from+'–'+overall.year_range.to+' · '+overall.total_draws.toLocaleString()+' '+L('dashboard.draws','draws')+' · '+overall.total_prizes.toLocaleString()+' '+L('fourd.prizeNumbers','prize numbers')+' · None '+overall.none_pct+'% · Double '+overall.double_pct+'% · Triple '+overall.triple_pct+'% · Quad '+overall.quad_pct+'%</p>';
    html += '<div class="grid g4" style="gap:12px">';
    html += digitCol(L('stats.single','Single')+' (X)', 'var(--em)', overall.digit_pct, function(d){return d;});
    html += digitCol(L('stats.doubles','Doubles')+' (XX)', 'var(--amb)', overall.double_pct_per_digit, function(d){return ''+d+d;});
    html += digitCol(L('stats.triples','Triples')+' (XXX)', 'var(--vi)', overall.triple_pct_per_digit, function(d){return ''+d+d+d;});
    html += digitCol(L('stats.quads','Quads')+' (XXXX)', 'var(--red)', overall.quad_pct_per_digit, function(d){return ''+d+d+d+d;});
    html += '</div>';
    el.innerHTML = html;
  });
}


function loadDollarSim() {
  var el = document.getElementById('dollarSim'); if (!el) return;
  fetch('/api/fourd/dollar-sim?operator='+alphaOp).then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data;
    var cur = alphaCur();
    var html = '<div style="padding:10px 14px;background:var(--bg);border-radius:6px;font-size:13px;color:var(--t2);margin-bottom:14px">';
    html += L('fourd.simulatedOverDraws','Simulated over <b>{draws} draws</b> — cost = {cur}{draws} for {cur}1/draw').replace(/\{draws\}/g, d.total_draws_scanned.toLocaleString()).replace(/\{cur\}/g, cur);
    html += '</div>';
    function renderRow(x, color) {
      var hits = x.first + x.second + x.third + x.starter + x.consol;
      var profitCol = x.profit >= 0 ? 'var(--em)' : 'var(--red)';
      return '<div style="display:flex;align-items:center;gap:14px;padding:10px 12px;background:var(--bg);border-left:3px solid '+profitCol+';border-radius:6px;margin-bottom:6px;flex-wrap:wrap">'+
        '<span style="font-family:var(--mo);font-size:22px;font-weight:800;color:var(--tx);min-width:70px">'+x.number+'</span>'+
        '<span style="font-family:var(--mo);font-size:18px;font-weight:800;color:'+profitCol+';min-width:90px">'+(x.profit>=0?'+'+cur:'-'+cur)+Math.abs(x.profit).toLocaleString()+'</span>'+
        '<span style="font-size:12px;color:var(--t3);min-width:60px">'+x.roi_pct+'% ROI</span>'+
        '<span style="font-size:12px;color:var(--t2);font-family:var(--mo)">'+L('fourd.firstAbbr','1st')+':'+x.first+' · '+L('fourd.secondAbbr','2nd')+':'+x.second+' · '+L('fourd.thirdAbbr','3rd')+':'+x.third+' · S:'+x.starter+' · C:'+x.consol+'</span>'+
        '<span style="margin-left:auto;font-size:11.5px;color:var(--t3)">'+hits+' '+L('fourd.totalHits','total hits')+'</span>'+
        '</div>';
    }
    html += '<div style="font-size:12.5px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+L('fourd.top5MostProfitable','Top 5 Most Profitable')+'</div>';
    d.most_profitable.slice(0, 5).forEach(function(x){ html += renderRow(x); });
    html += '<div style="font-size:12.5px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 10px">'+L('fourd.topWorst','TOP 5 WORST (MOST LOST)')+'</div>';
    d.least_profitable.slice(0, 5).forEach(function(x){ html += renderRow(x); });
    html += '<div style="margin-top:14px;font-size:12px;color:var(--t3);font-style:italic">'+L('fourd.pastResultsDisclaimer',"Past results — not a prediction. Future draws are independent, the same number won't necessarily keep winning.")+'</div>';
    el.innerHTML = html;
  });
}

window.loadDryBacktest = function() {
  var el = document.getElementById('dryBacktest'); if (!el) return;
  var sel = document.getElementById('dryThresh');
  var t = sel ? sel.value : 90;
  el.innerHTML = loadingCard();
  fetch('/api/fourd/dry-spell-backtest?threshold='+t).then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data, a = d.aggregate;
    var TIER = {first:'1st',second:'2nd',third:'3rd',starter:'Start',consol:'Cons'};
    var profitCol = a.total_profit >= 0 ? 'var(--em)' : 'var(--red)';
    var html = '';
    // === Aggregate verdict box ===
    html += '<div style="padding:18px;background:'+(a.total_profit>=0?'rgba(5,150,105,.08)':'rgba(220,38,38,.08)')+';border-left:4px solid '+profitCol+';border-radius:8px;margin-bottom:14px">';
    html += '<div style="font-size:11.5px;font-weight:800;color:'+profitCol+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Strategy verdict at '+d.threshold_pct+'% trigger</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px">';
    function tile(label, val, col, sub) {
      return '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">'+label+'</div><div style="font-family:var(--mo);font-size:20px;font-weight:800;color:'+col+'">'+val+'</div>'+(sub?'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+sub+'</div>':'')+'</div>';
    }
    html += tile('Net P/L', (a.total_profit>=0?'+$':'-$')+Math.abs(a.total_profit).toLocaleString(), profitCol);
    html += tile('Total cost', '$'+a.total_cost.toLocaleString(), 'var(--tx)', 'over '+a.total_bet_runs.toLocaleString()+' bet runs');
    html += tile('Total revenue', '$'+a.total_revenue.toLocaleString(), 'var(--tx)');
    html += tile('Win rate', a.win_rate_pct+'%', a.win_rate_pct >= 50 ? 'var(--em)' : 'var(--red)', a.total_wins.toLocaleString()+' / '+a.total_bet_runs.toLocaleString());
    html += tile('Numbers tested', a.numbers_tested.toLocaleString(), 'var(--tx)');
    html += tile('Profitable nums', a.profitable_numbers.toLocaleString(), 'var(--em)', Math.round(a.profitable_numbers/a.numbers_tested*100)+'%');
    html += tile('Losing nums', a.losing_numbers.toLocaleString(), 'var(--red)', Math.round(a.losing_numbers/a.numbers_tested*100)+'%');
    html += tile('Avg per number', (a.avg_profit_per_number>=0?'+$':'-$')+Math.abs(a.avg_profit_per_number), profitCol);
    html += '</div>';
    if (a.total_profit < 0) {
      html += '<div style="margin-top:12px;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:12.5px;color:var(--t2)"><b style="color:var(--red)">⚠ Honest finding:</b> the strategy lost <b>$'+Math.abs(a.total_profit).toLocaleString()+'</b> across the full archive. The win rate of '+a.win_rate_pct+'% (well below 50%) confirms the lottery is <b>memoryless</b> — a long dry spell does not increase the probability of an imminent hit. The few numbers that profited are statistical noise, not pattern detection.</div>';
    } else {
      html += '<div style="margin-top:12px;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:12.5px;color:var(--t2)"><b style="color:var(--em)">⚡ Unusual result:</b> the strategy was net positive. Check sample size and win-rate distribution before trusting — could still be variance with few large hits.</div>';
    }
    html += '</div>';

    function renderRow(x, rank, accent) {
      var pCol = x.total_profit >= 0 ? 'var(--em)' : 'var(--red)';
      var thr = Math.floor(x.longest_dry * d.threshold_pct / 100);
      var html = '<div style="padding:12px 14px;background:var(--bg);border-left:3px solid '+accent+';border-radius:6px;margin-bottom:8px">';
      html += '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px">';
      html += '<span style="font-family:var(--mo);font-size:14px;font-weight:800;color:'+accent+';min-width:28px">#'+rank+'</span>';
      html += '<span style="font-family:var(--mo);font-size:22px;font-weight:800;color:var(--tx);min-width:80px">'+x.number+'</span>';
      html += '<span style="font-size:12px;color:var(--t3)">longest dry <b style="font-family:var(--mo);color:var(--t2)">'+x.longest_dry+'</b> · trigger at <b style="font-family:var(--mo);color:var(--t2)">'+thr+'</b></span>';
      html += '<span style="font-size:12px;color:var(--t3)">'+x.bet_runs+' bet runs · '+x.win_rate_pct+'% win</span>';
      html += '<span style="font-size:12px;color:var(--t3)">spent <b style="font-family:var(--mo);color:var(--t2)">$'+x.total_cost.toLocaleString()+'</b> · earned <b style="font-family:var(--mo);color:var(--t2)">$'+x.total_revenue.toLocaleString()+'</b></span>';
      html += '<span style="margin-left:auto;font-family:var(--mo);font-size:16px;font-weight:800;color:'+pCol+'">'+(x.total_profit>=0?'+$':'-$')+Math.abs(x.total_profit).toLocaleString()+'</span>';
      html += '</div>';
      if (x.currently_betting) {
        html += '<div style="font-size:11.5px;color:var(--amb);font-weight:700">⏱ Currently in bet run: '+x.draws_bet_open+' draws bet since trigger (current gap '+x.current_gap+'). Last hit '+x.last_hit_date+' ('+TIER[x.last_hit_tier]+').</div>';
      }
      html += '</div>';
      return html;
    }

    // === CURRENTLY ACTIONABLE — most useful for live betting decisions ===
    if (d.currently_actionable && d.currently_actionable.length) {
      html += '<div style="font-size:13px;font-weight:800;color:var(--amb);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Currently in bet zone (right now)</div>';
      html += '<div style="font-size:12px;color:var(--t3);margin-bottom:10px;font-style:italic">These numbers\' current gap has already crossed the '+d.threshold_pct+'% threshold. The backtest says you\'d be betting on them today. Most have historical positive profit — but that\'s past performance, not a guarantee.</div>';
      d.currently_actionable.forEach(function(x, i) { html += renderRow(x, i+1, 'var(--amb)'); });
    } else {
      html += '<div style="padding:14px;background:var(--bg);border-radius:6px;font-size:12.5px;color:var(--t3);margin-bottom:14px;font-style:italic">No numbers currently in active bet zone at this threshold.</div>';
    }

    // === TOP WINNERS (historical, with caveat) ===
    html += '<div style="font-size:13px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px">Historical top winners (warning: small samples)</div>';
    html += '<div style="font-size:12px;color:var(--t3);margin-bottom:10px;font-style:italic">These would have been profitable IF you ran the strategy on them. But with only 3-7 bet runs each, the "100% win rate" is more luck than pattern.</div>';
    d.top_winners.forEach(function(x, i) { html += renderRow(x, i+1, 'var(--em)'); });

    // === TOP LOSERS ===
    html += '<div style="font-size:13px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px">Worst losers — strategy would have bled cash</div>';
    d.top_losers.forEach(function(x, i) { html += renderRow(x, i+1, 'var(--red)'); });

    el.innerHTML = html;
  });
};

      html += '<span style="color:var(--t3)">'+L('fourd.sinceLast','since last')+' <b style="font-family:var(--mo);color:'+(x.years_since_last_hit<=1?'#059669':x.years_since_last_hit<=3?'#d97706':'#dc2626')+';font-size:14px">'+x.years_since_last_hit+'y</b></span>';
      html += '<span style="margin-left:auto;color:var(--t3)">'+x.total_hits+' '+L('fourd.totalHits','total hits')+'</span>';
      html += '</div>';
      // Tier chips — shown for BOTH direct 4D and iBet
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;font-family:var(--mo);font-size:13px;font-weight:700;margin-bottom:6px">';
      Object.keys(TIER).forEach(function(k) {
        var t = TIER[k], n = x.tiers[k];
        var col = n > 0 ? t.col : 'var(--t3)';
        var op = n > 0 ? '1' : '.4';
        html += '<span style="color:'+col+';opacity:'+op+'">'+t.label+':<b style="margin-left:3px">'+n+'</b></span>';
      });
      html += '</div>';
      // iBet rows also show example perms below the chips
      if (isIbet) {
        html += '<div style="font-size:11.5px;color:var(--t3);font-family:var(--mo);margin-bottom:4px">example perms: '+x.example_perms.join(' · ')+'</div>';
      }
      // Year strip — each year cell shows the hit count only (tier breakdown on hover)
      var pyb = x.per_year_breakdown || {};
      html += '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;font-family:var(--mo)">';
      for (var y = d.year_range.from; y <= d.year_range.to; y++) {
        var yb = pyb[y];
        var hit = !!yb;
        var cellBg = hit ? '#3730a3' : 'transparent';
        var cellBorder = hit ? '1px solid #3730a3' : '1px solid var(--bl)';
        var titleStr = hit
          ? y+': '+yb.total+' hit'+(yb.total!==1?'s':'')+' ('+yb.first+'×1st, '+yb.second+'×2nd, '+yb.third+'×3rd, '+yb.starter+'×starter, '+yb.consol+'×consol)'
          : y+': no hits';
        html += '<div title="'+titleStr+'" style="padding:3px 5px;background:'+cellBg+';border:'+cellBorder+';border-radius:4px;min-width:30px;text-align:center;line-height:1.2">';
        html += '<div style="font-size:9.5px;font-weight:700;color:'+(hit?'#fff':'var(--t3)')+'">'+(''+y).slice(-2)+'</div>';
        if (hit) {
          html += '<div style="font-size:10px;font-weight:800;color:#fff;margin-top:1px">'+yb.total+'×</div>';
        } else {
          html += '<div style="font-size:9px;color:var(--t3);opacity:.4;margin-top:1px">·</div>';
        }
        html += '</div>';
      }
      html += '</div>';
      html += '</div>';
      return html;
    }
    var html = '';
    html += '<div style="padding:10px 14px;background:var(--bg);border-radius:6px;font-size:13px;color:var(--t2);margin-bottom:14px">';
    html += L('fourd.acrossYears','Across <b>{yrs} years ({from}-{to})</b>: <b>{direct}</b> direct-4D candidates with ≥10 hits; <b>{ibet}</b> iBet sets with ≥20 hits.')
            .replace('{yrs}', d.total_years).replace('{from}', d.year_range.from).replace('{to}', d.year_range.to)
            .replace('{direct}', d.direct_4d.total_candidates.toLocaleString()).replace('{ibet}', d.ibet.total_candidates.toLocaleString());
    html += '</div>';
    // Direct 4D section
    html += '<div style="font-size:13px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+L('fourd.directBestRegulars','Direct 4D — best year-over-year regulars')+'</div>';
    d.direct_4d.most_consistent.forEach(function(x, i) { html += renderRow(x, i+1, false); });
    // iBet section
    html += '<div style="font-size:13px;font-weight:800;color:var(--vi);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 10px">'+L('fourd.ibetBestRegulars','iBet — best year-over-year regulars')+'</div>';
    html += '<div style="font-size:12px;color:var(--t3);margin-bottom:10px;font-style:italic">All top iBet sets hit nearly every year, but profit is usually negative due to perm-division. Use this list to see <b>which digit-sets to avoid for iBet</b>.</div>';
    d.ibet.most_consistent.forEach(function(x, i) { html += renderRow(x, i+1, true); });
    el.innerHTML = html;
  });
}


// Calendar profile for one picked 4D number — month-by-month hit distribution
window.loadCalBiasNumber = function() {
  var inp = document.getElementById('calBiasN'); if (!inp) return;
  var num = (inp.value || '').replace(/\D/g,'').padStart(4,'0').slice(0,4);
  var el = document.getElementById('calBiasNumResult'); if (!el) return;
  if (!inp.value.trim()) { el.innerHTML=''; return; }
  el.innerHTML = loadingCard();
  var MN = [L('common.month.jan','Jan'),L('common.month.feb','Feb'),L('common.month.mar','Mar'),L('common.month.apr','Apr'),L('common.month.may','May'),L('common.month.jun','Jun'),L('common.month.jul','Jul'),L('common.month.aug','Aug'),L('common.month.sep','Sep'),L('common.month.oct','Oct'),L('common.month.nov','Nov'),L('common.month.dec','Dec')];
  fetch('/api/fourd/calendar-bias?number='+num+'&operator='+alphaOp).then(function(r){return r.json();}).then(function(resp){
    if(!resp.success){ el.innerHTML='<div class="card" style="padding:16px;color:var(--red)">'+L('common.error','Error')+'</div>'; return; }
    var j = resp.data || {};
    if(!j.total_hits){ el.innerHTML='<div style="padding:14px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;font-size:13px;color:var(--t3)"><b style="font-family:var(--mo);color:var(--tx);font-size:16px">'+j.number+'</b> — '+L('fourd.neverHit','never appeared in the archive.')+'</div>'; return; }
    var maxHits = Math.max.apply(null, j.months.map(function(m){return m.hits;})) || 1;
    var bm = j.best_month;
    var html = '<div style="padding:16px;background:var(--cd);border:1px solid var(--bd);border-radius:10px">';
    html += '<div style="display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:4px"><span style="font-family:var(--mo);font-size:26px;font-weight:800;color:var(--tx);letter-spacing:.06em">'+j.number+'</span><span style="font-size:12.5px;color:var(--t2)"><b>'+j.total_hits+'</b> '+L('history.hits','hits').replace('win(s)','hits')+' · '+L('fourd.avgPerMonth','avg')+' '+j.avg_per_month+'/'+L('common.month.mon','mo')+'</span></div>';
    if(bm) html += '<div style="font-size:12.5px;color:var(--vi);font-weight:700;margin-bottom:14px">'+L('fourd.leansToward','Leans toward')+' '+MN[bm.month-1]+' — '+bm.hits+' '+L('history.hits','hits').replace('win(s)','hits')+' ('+(bm.lift>0?'+':'')+bm.lift+' '+L('fourd.vsExpected','vs expected')+')</div>';
    // month bars
    html += '<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:5px;align-items:end;height:120px;margin-bottom:6px">';
    j.months.forEach(function(m){
      var pct = Math.round((m.hits/maxHits)*100);
      var hot = bm && m.month===bm.month;
      html += '<div style="display:flex;flex-direction:column;justify-content:flex-end;height:100%" title="'+MN[m.month-1]+': '+m.hits+' hits (expected '+m.expected+')">'+
        '<span style="font-size:9.5px;font-weight:700;color:'+(hot?'var(--vi)':'var(--t3)')+';text-align:center;margin-bottom:3px;font-family:var(--mo)">'+m.hits+'</span>'+
        '<div style="width:100%;height:'+Math.max(pct,3)+'%;background:'+(hot?'var(--vi)':'color-mix(in srgb, var(--vi) 35%, transparent)')+';border-radius:4px 4px 0 0;min-height:3px"></div>'+
      '</div>';
    });
    html += '</div><div style="display:grid;grid-template-columns:repeat(12,1fr);gap:5px">';
    j.months.forEach(function(m){ html += '<div style="font-size:10px;color:'+((bm&&m.month===bm.month)?'var(--vi)':'var(--t3)')+';text-align:center;font-weight:700">'+MN[m.month-1]+'</div>'; });
    html += '</div>';
    html += '<p style="font-size:11px;color:var(--t3);margin:12px 0 0;line-height:1.5">'+L('fourd.calBiasNote','Distribution across all years combined. A tall bar is historical, not predictive — 4D stays random.')+'</p>';
    html += '</div>';
    el.innerHTML = html;
  }).catch(function(e){ el.innerHTML='<div class="card" style="padding:16px;color:var(--red)">'+e.message+'</div>'; });
};

function loadCalendarBias() {
  var el = document.getElementById('calendarBias'); if (!el) return;
  el.innerHTML = loadingCard();
  fetch('/api/fourd/calendar-bias?operator='+alphaOp).then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data;
    var cur = alphaCur();
    var html = '<div style="padding:10px 14px;background:var(--bg);border-radius:6px;font-size:13px;color:var(--t2);margin-bottom:14px">';
    html += L('fourd.calBiasIntro','<b>{count}</b> numbers cleared z≥2. Sim assumes <b>{cur}1 Big bet ONLY during cluster months</b> (you skip the rest of the year). Watch the "lucky-strike" warning — one big first prize can cover thousands of bets; if remove-biggest-hit profit turns negative, the apparent edge is a one-off, not a recurring pattern.').replace('{count}', d.total_candidates.toLocaleString()).replace(/\{cur\}/g, cur);
    html += '</div>';
    var months = ['',
      L('common.month.jan','Jan'),L('common.month.feb','Feb'),L('common.month.mar','Mar'),L('common.month.apr','Apr'),
      L('common.month.may','May'),L('common.month.jun','Jun'),L('common.month.jul','Jul'),L('common.month.aug','Aug'),
      L('common.month.sep','Sep'),L('common.month.oct','Oct'),L('common.month.nov','Nov'),L('common.month.dec','Dec')];
    var monthsEN = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var TIER_LABEL = { first:L('fourd.firstAbbr','1st'), second:L('fourd.secondAbbr','2nd'), third:L('fourd.thirdAbbr','3rd'), starter:L('fourd.startAbbr','Start'), consol:L('fourd.consAbbr','Cons') };
    d.top.forEach(function(x, i) {
      var bigCol = x.big_profit_only_window >= 0 ? 'var(--em)' : 'var(--red)';
      var withoutBigCol = x.big_profit_without_biggest_hit >= 0 ? 'var(--em)' : 'var(--red)';
      var ibetCol = x.ibet_profit_only_window >= 0 ? 'var(--em)' : 'var(--red)';
      var zCol = x.z_score >= 5 ? '#dc2626' : x.z_score >= 4 ? '#d97706' : 'var(--t2)';
      var pctInCluster = Math.round(x.hits_in_window / x.total_hits * 100);
      // Lucky-strike test: if the single biggest hit > 50% of revenue, flag it
      var luckyStrike = x.biggest_hit && x.biggest_hit.payout > 0 &&
        (x.big_profit_only_window - x.big_profit_without_biggest_hit) >= (x.big_profit_only_window + x.draws_in_window) * 0.5;

      html += '<div style="padding:14px;background:var(--bg);border-left:3px solid '+(luckyStrike?'var(--amb)':'var(--vi)')+';border-radius:6px;margin-bottom:10px">';
      // Header row
      html += '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px">';
      html += '<span style="font-family:var(--mo);font-size:14px;font-weight:800;color:var(--vi);min-width:28px">#'+(i+1)+'</span>';
      html += '<span style="font-family:var(--mo);font-size:22px;font-weight:800;color:var(--tx);min-width:80px">'+x.number+'</span>';
      // Translate month names in best_months (backend returns English abbrevs)
      var bestMonthsLocal = x.best_months.map(function(m){ var i = monthsEN.indexOf(m); return i>0 ? months[i] : m; });
      html += '<span style="font-family:var(--mo);font-size:14px;font-weight:800;color:var(--vi)">→ '+bestMonthsLocal.join('+')+'</span>';
      html += '<span style="font-size:12px;color:var(--t2)">'+L('fourd.calBiasHitsHere','<b>{hits}</b>/{tot} hits ({pct}%) here').replace('{hits}', x.hits_in_window).replace('{tot}', x.total_hits).replace('{pct}', pctInCluster)+'</span>';
      if (x.last_cluster_hit) {
        html += '<span style="font-size:11.5px;color:var(--t3)">'+L('fourd.calBiasLastHit','last cluster hit:')+' <b style="font-family:var(--mo);color:var(--p)">'+x.last_cluster_hit.date+'</b> ('+TIER_LABEL[x.last_cluster_hit.tier]+')</span>';
      }
      html += '<span style="margin-left:auto;font-family:var(--mo);font-size:13px;font-weight:800;color:'+zCol+'">z='+x.z_score+'</span>';
      html += '</div>';

      // Lucky-strike warning banner
      if (luckyStrike) {
        html += '<div style="padding:8px 12px;background:rgba(217,119,6,.10);border-left:3px solid var(--amb);border-radius:6px;margin-bottom:10px;font-size:12px;color:var(--t2)">';
        html += '<b style="color:var(--amb)">⚠ Lucky-strike warning:</b> a single ' + TIER_LABEL[x.biggest_hit.tier].toLowerCase() + ' on <b style="font-family:var(--mo)">' + x.biggest_hit.date + '</b> ($' + x.biggest_hit.payout.toLocaleString() + ') accounts for most of this profit. Strip it out and you lose money — the "edge" is one historical hit, not a recurring pattern.';
        html += '</div>';
      }

      // Profit row — Big, Big without biggest hit, iBet
      html += '<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:12.5px;margin-bottom:10px">';
      html += '<div style="padding:7px 12px;background:var(--cd);border-radius:6px;border-left:3px solid '+bigCol+'"><div style="color:var(--t3);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em">'+L('fourd.calBiasBigCluster','BIG · CLUSTER ONLY')+'</div><b style="color:'+bigCol+';font-family:var(--mo);font-size:15px">'+(x.big_profit_only_window>=0?'+'+cur:'-'+cur)+Math.abs(x.big_profit_only_window).toLocaleString()+'</b></div>';
      html += '<div style="padding:7px 12px;background:var(--cd);border-radius:6px;border-left:3px solid '+withoutBigCol+'"><div style="color:var(--t3);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em">'+L('fourd.calBiasBigRemove','BIG · REMOVE BIGGEST HIT')+'</div><b style="color:'+withoutBigCol+';font-family:var(--mo);font-size:15px">'+(x.big_profit_without_biggest_hit>=0?'+'+cur:'-'+cur)+Math.abs(x.big_profit_without_biggest_hit).toLocaleString()+'</b></div>';
      html += '<div style="padding:7px 12px;background:var(--cd);border-radius:6px;border-left:3px solid '+ibetCol+'"><div style="color:var(--t3);font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em">'+L('fourd.calBiasIbet','IBET ({n} PERMS)').replace('{n}', x.ibet_perms)+'</div><b style="color:'+ibetCol+';font-family:var(--mo);font-size:15px">'+(x.ibet_profit_only_window>=0?'+'+cur:'-'+cur)+Math.abs(x.ibet_profit_only_window).toLocaleString()+'</b></div>';
      html += '<div style="padding:7px 12px;background:var(--cd);border-radius:6px;align-self:center"><span style="color:var(--t3);font-weight:600;font-size:11.5px">'+L('fourd.calBiasRecent10y','Recent cluster (last 10y):')+'</span> <b style="font-family:var(--mo);color:'+(x.cluster_hits_recent_10y>0?'var(--em)':'var(--red)')+';font-size:13px">'+x.cluster_hits_recent_10y+'</b></div>';
      html += '<div style="padding:7px 12px;background:var(--cd);border-radius:6px;align-self:center"><span style="color:var(--t3);font-weight:600;font-size:11.5px">'+L('fourd.calBiasOutside','Outside cluster:')+'</span> <b style="font-family:var(--mo);color:var(--t2);font-size:13px">'+x.hits_outside+'/'+x.draws_outside.toLocaleString()+' '+L('fourd.calBiasDraws','draws')+'</b></div>';
      html += '</div>';

      // 12-month grid
      html += '<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:3px;font-family:var(--mo)">';
      for (var m = 0; m < 12; m++) {
        var hits = x.monthly_hits[m];
        var inCluster = x.best_months.indexOf(months[m+1]) >= 0;
        var bg = inCluster ? 'rgba(124,58,237,.18)' : (hits === 0 ? 'var(--bl)' : 'var(--cd)');
        var col = inCluster ? 'var(--vi)' : (hits === 0 ? 'var(--t3)' : 'var(--t2)');
        var w = inCluster ? 800 : 600;
        html += '<div style="padding:5px;background:'+bg+';border-radius:4px;text-align:center">';
        html += '<div style="font-size:9.5px;color:var(--t3);text-transform:uppercase">'+months[m+1]+'</div>';
        html += '<div style="font-size:14px;font-weight:'+w+';color:'+col+'">'+hits+'</div>';
        html += '</div>';
      }
      html += '</div></div>';
    });
    el.innerHTML = html;
  });
}

function loadIbetSim() {

    if (!j.success) { el.innerHTML = 'Error'; return; }

        '<span style="font-family:var(--mo);font-size:18px;font-weight:800;color:'+profitCol+';min-width:90px">'+(x.profit>=0?'+'+cur:'-'+cur)+Math.abs(x.profit).toLocaleString()+'</span>'+
        '<span style="font-size:12px;color:var(--t3);min-width:60px">'+x.roi_pct+'% ROI</span>'+
        '<span style="font-size:12px;color:var(--t2);font-family:var(--mo)">'+L('fourd.firstAbbr','1st')+':'+x.first+' · '+L('fourd.secondAbbr','2nd')+':'+x.second+' · '+L('fourd.thirdAbbr','3rd')+':'+x.third+' · S:'+x.starter+' · C:'+x.consol+'</span>'+
        '<span style="margin-left:auto;font-size:11.5px;color:var(--t3)">'+hits+' '+L('fourd.permHits','perm hits')+' · '+L('fourd.revPrefix','rev')+' '+cur+(x.revenue||0).toLocaleString()+'</span>'+
        '</div>';
    }
    html += '<div style="font-size:12.5px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+L('fourd.topProfitableIbet','TOP 5 MOST PROFITABLE IBET SETS')+'</div>';
    d.most_profitable.slice(0, 5).forEach(function(x){ html += renderRow(x); });
    html += '<div style="font-size:12.5px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 10px">'+L('fourd.topWorstShort','TOP 5 WORST')+'</div>';
    d.least_profitable.slice(0, 5).forEach(function(x){ html += renderRow(x); });
    html += '<div style="margin-top:14px;font-size:12px;color:var(--t3);font-style:italic">iBet sets are deduplicated by sorted digits — order doesn\'t matter (1234 = 4321 = same set).</div>';
    el.innerHTML = html;
  });
}

function loadYearlyWinners() {
  var el = document.getElementById('yearlyWinners'); if (!el) return;
  fetch('/api/fourd/dollar-sim-yearly-winners?operator='+alphaOp).then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var years = j.data.years;
    var cur = alphaCur();
    // Tier colors (chosen for clarity on dark/light backgrounds, readable for older eyes)
    var TIER = [
      { label: L('fourd.firstAbbr','1st'),   col: '#059669', key: 'first' },     // green
      { label: L('fourd.secondAbbr','2nd'),  col: '#ea580c', key: 'second' },    // orange
      { label: L('fourd.thirdAbbr','3rd'),   col: '#2563eb', key: 'third' },     // blue
      { label: L('fourd.startAbbr','Start'), col: '#4b5563', key: 'starter' },   // dark grey
      { label: L('fourd.consAbbr','Cons'),   col: '#0f172a', key: 'consol' },    // near-black
    ];
    var html = '';
    // === Boxed legend at top ===
    html += '<div style="display:flex;gap:18px;flex-wrap:wrap;padding:12px 16px;background:var(--cd);border:1px solid var(--bd);border-radius:8px;margin-bottom:14px;font-size:14px;font-weight:700">';
    html += '<span style="color:var(--t3);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;align-self:center">'+L('fourd.legend','Legend')+'</span>';
    TIER.forEach(function(t) {
      html += '<span style="display:inline-flex;align-items:center;gap:6px"><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:'+t.col+'"></span><span style="color:'+t.col+';font-family:var(--mo)">'+t.label+'</span></span>';
    });
    html += '</div>';
    // === All years in one box, multi-column grid (auto-fits screen) ===
    html += '<div style="padding:14px;background:var(--cd);border:1px solid var(--bd);border-radius:10px">';
    html += '<div class="grid g5" style="gap:8px">';
    years.slice().reverse().forEach(function(y) {
      function tierSpan(t){ var n = y[t.key], col = n > 0 ? t.col : 'var(--t3)', op = n > 0 ? '1' : '.5'; return '<span style="color:'+col+';opacity:'+op+'">'+t.label+':<b>'+n+'</b></span>'; }
      html += '<div style="padding:9px 10px;background:var(--bg);border-radius:8px">';
      // Row 1: year (left) · number (centre) · profit (right)
      html += '<div style="display:flex;align-items:baseline;gap:4px;margin-bottom:6px">';
      html += '<span style="flex:1;text-align:left;font-family:var(--mo);font-size:11px;font-weight:800;color:var(--p)">'+y.year+'</span>';
      html += '<span style="font-family:var(--mo);font-size:18px;font-weight:800;color:var(--tx);letter-spacing:.02em">'+y.number+'</span>';
      html += '<span style="flex:1;text-align:right;font-family:var(--mo);font-size:11px;font-weight:800;color:#059669">+'+cur+y.profit.toLocaleString()+'</span>';
      html += '</div>';
      // Row 2: 1st / 2nd / 3rd
      html += '<div style="display:flex;gap:9px;font-family:var(--mo);font-size:11px;font-weight:700;margin-bottom:4px">';
      TIER.slice(0,3).forEach(function(t){ html += tierSpan(t); });
      html += '</div>';
      // Row 3: Start / Cons on the left, ROI on the right
      html += '<div style="display:flex;gap:9px;align-items:baseline;font-family:var(--mo);font-size:11px;font-weight:700">';
      TIER.slice(3).forEach(function(t){ html += tierSpan(t); });
      html += '<span style="color:var(--t3);font-size:10px;margin-left:auto">'+y.roi+'%</span>';
      html += '</div></div>';
    });
    html += '</div></div>';
    el.innerHTML = html;
  });
}


window.loadIbet = function() {
  var raw = (document.getElementById('ibetDigits').value || '').replace(/\D/g, '').slice(0,4);
  if (raw.length !== 4) { alert('Enter exactly 4 digits'); return; }
  var out = document.getElementById('ibetResult');
  out.innerHTML = loadingCard();
  fetch('/api/fourd/ibet?digits=' + raw).then(r=>r.json()).then(function(j) {
    if (!j.success) { out.innerHTML = 'Error: '+(j.error||''); return; }
    var d = j.data;
    var html = '<div style="padding:12px 14px;background:var(--bg);border-radius:8px;margin-bottom:14px;font-size:13.5px;color:var(--t2);line-height:1.7">';
    html += 'Input <b style="font-family:var(--mo);color:var(--tx)">'+d.input+'</b> → <b>'+d.unique_perms+' unique permutations</b><br>';
    html += 'Across '+d.total_draws_scanned.toLocaleString()+' draws: <b style="color:var(--em)">'+d.total_ibet_hits+' total prize hits</b> <span style="color:var(--t3)">('+d.hit_rate_pct+'% any-prize per draw)</span>';
    html += '</div>';
    // Permutation table
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px;font-family:var(--mo)">';
    html += '<thead><tr style="border-bottom:2px solid var(--bd);color:var(--t3);font-size:11px;text-transform:uppercase;letter-spacing:.05em">';
    html += '<th style="padding:8px 6px;text-align:left">Perm</th><th style="padding:8px 6px;text-align:right">1st</th><th style="padding:8px 6px;text-align:right">2nd</th><th style="padding:8px 6px;text-align:right">3rd</th><th style="padding:8px 6px;text-align:right">Starter</th><th style="padding:8px 6px;text-align:right">Consol</th><th style="padding:8px 6px;text-align:right">Total</th>';
    html += '</tr></thead><tbody>';
    d.perms.forEach(function(p) {
      var rowBg = p.total === 0 ? 'rgba(107,114,128,.04)' : (p.total >= 10 ? 'rgba(5,150,105,.06)' : '');
      html += '<tr style="border-bottom:1px solid var(--bl);background:'+rowBg+'">';
      html += '<td style="padding:7px 6px;font-weight:800;color:var(--tx)">'+p.perm+'</td>';
      html += '<td style="padding:7px 6px;text-align:right;color:'+(p.first>0?'var(--em)':'var(--t3)')+';font-weight:'+(p.first>0?700:400)+'">'+p.first+'</td>';
      html += '<td style="padding:7px 6px;text-align:right;color:'+(p.second>0?'var(--t2)':'var(--t3)')+'">'+p.second+'</td>';
      html += '<td style="padding:7px 6px;text-align:right;color:'+(p.third>0?'var(--amb)':'var(--t3)')+'">'+p.third+'</td>';
      html += '<td style="padding:7px 6px;text-align:right;color:var(--t2)">'+p.starter+'</td>';
      html += '<td style="padding:7px 6px;text-align:right;color:var(--t2)">'+p.consol+'</td>';
      html += '<td style="padding:7px 6px;text-align:right;font-weight:800;color:'+(p.total>0?'var(--p)':'var(--t3)')+'">'+p.total+'</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    out.innerHTML = html;
  });
};





window.loadAddPartners = function() {
  var n = parseInt(document.getElementById('addPartnerN').value, 10);
  if (!n || n < 1 || n > 49) { alert('Pick 1-49'); return; }
  var out = document.getElementById('addPartnerResult'); out.innerHTML = loadingCard();
  fetch('/api/toto/additional-partners?add='+n).then(r=>r.json()).then(function(j) {
    if (!j.success) { out.innerHTML = 'Error'; return; }
    var d = j.data;
    var html = '';
    html += '<div style="font-size:13px;color:var(--t2);margin-bottom:14px"><b>'+n+'</b> was the additional in <b>'+d.draws_with_anchor+'</b> draws. Top partner mains:</div>';
    if (d.draws_with_anchor === 0) {
      html += '<p style="font-size:12.5px;color:var(--t3)">No draws with '+n+' as the additional.</p>';
    } else {
      html += '<div style="display:flex;gap:10px;flex-wrap:wrap">';
      d.top_partners.forEach(function(p){
        html += '<div style="display:flex;flex-direction:column;align-items:center;gap:3px">'+
          makeBall(p.n, 38, "var(--p)", 0)+
          '<span style="font-size:11px;color:var(--t3);font-weight:600;font-family:var(--mo)">'+p.c+'×</span>'+
          '</div>';
      });
      html += '</div>';
    }
    out.innerHTML = html;
  });
};

window.loadDream = function() {
  var q = document.getElementById('dreamQ').value.trim();
  if (!q) { alert('Type a dream subject'); return; }
  var out = document.getElementById('dreamResult'); out.innerHTML = loadingCard();
  fetch('/api/fourd/dream?q='+encodeURIComponent(q)).then(r=>r.json()).then(function(j) {
    if (!j.success) { out.innerHTML = 'Error'; return; }
    var d = j.data;
    var html = '';
    if (!d.results || d.results.length === 0) {
      html += '<p style="font-size:13px;color:var(--t2);margin-bottom:10px">No match for "<b>'+q+'</b>". Try one of these:</p>';
      fetch('/api/fourd/dream').then(r=>r.json()).then(function(j2) {
        var available = j2.data.available || [];
        var sug = '<div style="display:flex;gap:6px;flex-wrap:wrap">';
        available.forEach(function(k){ sug += '<span style="padding:4px 10px;background:var(--bg);border-radius:5px;font-size:12px;color:var(--t2)">'+k+'</span>'; });
        sug += '</div>';
        out.innerHTML = html + sug;
      });
    } else {
      d.results.forEach(function(r) {
        html += '<div style="padding:12px 14px;background:var(--bg);border-radius:8px;margin-bottom:10px">';
        html += '<div style="font-size:13px;font-weight:700;color:var(--vi);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Dream of "'+r.dream+'"</div>';
        html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">';
        r.numbers.forEach(function(n){
          html += '<span style="font-family:var(--mo);font-weight:800;font-size:20px;color:var(--amb);padding:4px 12px;background:rgba(217,119,6,.08);border-radius:6px">'+n+'</span>';
        });
        html += '</div>';
        html += '<div style="font-size:11.5px;color:var(--t3);font-style:italic">'+r.note+'</div>';
        html += '</div>';
      });
      out.innerHTML = html;
    }
  });
};

function loadRecent(win) {
  var el = document.getElementById('recentHotCold'); if (!el) return;
  win = win || 50;
  // Update tab active states
  document.querySelectorAll('[data-window]').forEach(function(btn){
    btn.className = 'tab' + (parseInt(btn.dataset.window) === win ? ' active' : '');
  });
  el.innerHTML = loadingCard();
  fetch('/api/toto/recent?window='+win).then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data;
    var html = '<div class="grid g2" style="gap:18px">';
    var hotLbl  = L('toto.hottestInLast','Hottest in last {n} draws').replace('{n}', d.window);
    var coldLbl = L('toto.coldestInLast','Coldest in last {n} draws').replace('{n}', d.window);
    [[hotLbl, d.hot, '#dc2626'],
     [coldLbl, d.cold, '#0891b2']].forEach(function(sec) {
      html += '<div><div style="font-size:12.5px;font-weight:800;color:'+sec[2]+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+sec[0]+'</div>';
      html += '<div style="display:flex;gap:14px;flex-wrap:wrap">';
      sec[1].forEach(function(n){ html += ballWithTier(n.number, n.count, sec[2], 42); });
      html += '</div></div>';
    });
    html += '</div>';
    el.innerHTML = html;
  });
}
window.setRecentWindow = function(w) { loadRecent(w); };
