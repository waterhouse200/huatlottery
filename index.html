/* ───────── Tablet & smaller (≤ 768px) ───────── */
@media (max-width:768px){
  html,body{overflow-x:hidden}

  /* Sidebar becomes a slide-in drawer */
  .sb{position:fixed;top:0;left:0;bottom:0;width:260px;min-width:260px;transform:translateX(-100%);transition:transform .25s ease;z-index:100;will-change:transform}

}

<script>
// ═══ DWELL-TIME TRACKING ═════════════════════════════════════
// Measures how long visitors spend on each tab + their full session.
// Sent as a single beacon on pagehide / visibilitychange→hidden so it
// reliably fires even when the user closes the tab. Capped client-side
// so an open-and-forgotten tab can't skew averages.
var __DWELL = {
  sessionStart: Date.now(),
  tabStart:     Date.now(),
  currentTab:   null,           // set after currentTab init below
  tabTimes:     {},             // { tabName: totalMs }
  sent:         false,          // beacon is idempotent — only send once
};
function __dwellAccumulate() {
  var tab = __DWELL.currentTab;
  if (!tab) return;
  var dt = Date.now() - __DWELL.tabStart;
  if (dt < 200 || dt > 1800000) { __DWELL.tabStart = Date.now(); return; }
  __DWELL.tabTimes[tab] = (__DWELL.tabTimes[tab] || 0) + dt;
  __DWELL.tabStart = Date.now();
}
function __dwellOnTabSwitch(newTab) {
  __dwellAccumulate();
  __DWELL.currentTab = newTab;
}
function __dwellBeacon() {
  if (__DWELL.sent) return;
  __dwellAccumulate();
  var payload = {
    sessionMs: Math.min(Date.now() - __DWELL.sessionStart, 7200000),
    tabs: __DWELL.tabTimes,
  };
  // Skip empty / instant-bounce sessions
  if (payload.sessionMs < 500) return;
  __DWELL.sent = true;
  try {
    var body = JSON.stringify(payload);
    var blob = new Blob([body], { type: "application/json" });
    if (navigator.sendBeacon) {

    } else {

        headers: { "Content-Type": "application/json" }, keepalive: true });
    }
  } catch (e) { /* never let analytics break the page */ }
}

function makeBall(n, size, color, delay) {

// Returns the localized 3-letter day name for an ISO date like 2026-06-11.
// Uses common.dow.* keys which already exist in en.json + zh.json so EN gives
// "Wed" and 中文 gives "周三". Returns '' on bad input — never throws.
function dayOfWeek(iso) {
  if (!iso) return '';
  var d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return '';
  var keys = ['sun','mon','tue','wed','thu','fri','sat'];
  var k = keys[d.getDay()];
  return L('common.dow.' + k, k.charAt(0).toUpperCase() + k.slice(1));
}

// ─── Lazy-load helper: fire fn() the first time elementId is on-screen ──
// Drops the 8–15 simultaneous fetches per tab to just the visible ones.
// Subsequent scrolls trigger off-screen cards as the user reaches them.
window.__lazyObs = null;
window.__lazyPending = {};
function lazyLoad(elementId, fn) {
  if (!window.IntersectionObserver) {
    // Fallback: load immediately on browsers without IntersectionObserver
    setTimeout(fn, 50);
    return;
  }
  if (!window.__lazyObs) {
    window.__lazyObs = new IntersectionObserver(function(entries){
      entries.forEach(function(entry){
        if (!entry.isIntersecting) return;
        var id = entry.target.id;
        var pending = window.__lazyPending[id];
        if (pending) {
          delete window.__lazyPending[id];
          window.__lazyObs.unobserve(entry.target);
          pending();
        }
      });
    }, { rootMargin: '300px 0px' }); // start fetching 300px before scroll reaches
  }
  // Poll for the element existing (renderPage may not have flushed DOM yet)
  var tries = 0;
  (function attach() {
    var el = document.getElementById(elementId);
    if (el) {
      window.__lazyPending[elementId] = fn;
      window.__lazyObs.observe(el);
      return;
    }
    if (++tries < 30) setTimeout(attach, 30);
  })();
}
// Reset observer when switching tabs — avoid stale targets
function resetLazyObserver() {
  if (window.__lazyObs) { try { window.__lazyObs.disconnect(); } catch (e) {} }
  window.__lazyObs = null;
  window.__lazyPending = {};
}

  h += '<div style="margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px 14px;font-size:12.5px">';
  function classifyRow(n, isAdditional) {
    var info = tiers[n] || { tier: "AVERAGE" };
    var st = TIER_STYLE[info.tier];
    var ballColor = isAdditional ? "var(--red)" : "var(--p)";
    return '<div style="display:flex;align-items:center;gap:10px;min-width:0">'+
           makeBall(n, 30, ballColor, 0) +
           '<span style="padding:4px 10px;border-radius:6px;background:'+st.bg+';color:'+st.color+';font-size:11.5px;font-weight:800;letter-spacing:.04em;flex-shrink:0">'+st.label+'</span></div>';
  }
  t.numbers.forEach(function(n){ h += classifyRow(n, false); });
  h += classifyRow(t.additional_num, true);
  h += '</div></div>';

  // \u2500\u2500 4D card header \u2014 matches TOTO sizing, properly centered icon
  h += '<div class="card">';
  h += '<div style="display:flex;align-items:center;gap:14px;margin-bottom:10px">';
  h += '<div style="background:#d9770611;color:var(--amb);width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+svgIcon("hash",28)+'</div>';
  h += '<div style="font-size:22px;font-weight:800;color:var(--amb);letter-spacing:.04em">4D</div>';
  h += '</div>';
  h += '<div style="font-family:var(--mo);font-size:36px;font-weight:800;color:var(--tx);letter-spacing:.02em;margin-bottom:4px;line-height:1">#'+f.draw_no+'</div>';
  h += '<div style="font-size:16px;color:var(--t2);font-weight:600;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">'+
       '<span>'+f.draw_date+'</span>'+
       '<span style="font-size:12.5px;font-weight:700;color:var(--amb);background:#d9770611;padding:2px 9px;border-radius:5px;letter-spacing:.02em">'+dayOfWeek(f.draw_date)+'</span>'+
       '</div>';

  // Top 3 prizes \u2014 same size, with top-3 archive hit count beside each
  var top3 = f.top3_counts || {};
  [{l:L('dashboard.first','1st Prize'),v:f.first_prize,c:"var(--amb)",cnt:top3.first},
   {l:L('dashboard.second','2nd Prize'),v:f.second_prize,c:"var(--t2)",cnt:top3.second},
   {l:L('dashboard.third','3rd Prize'),v:f.third_prize,c:"#b45309",cnt:top3.third}].forEach(function(item,i) {
    h += '<div style="padding:10px 0;border-bottom:'+(i<2?'1px solid var(--bl)':'none')+';display:flex;align-items:baseline;gap:14px;flex-wrap:wrap">';
    h += '<div style="font-size:12px;font-weight:700;color:'+item.c+';text-transform:uppercase;letter-spacing:.05em;min-width:90px">'+item.l+'</div>';
    h += '<div style="font-family:var(--mo);font-size:26px;font-weight:800;color:'+item.c+';letter-spacing:.05em">'+item.v+'</div>';
    if (item.cnt != null) {
      // Bigger \u00d7 N indicator + double-spacing before the descriptor text
      h += '<div style="font-size:18px;font-weight:800;color:'+item.c+';font-family:var(--mo);margin-left:18px">\u00d7 '+item.cnt+'</div>';
      h += '<div style="font-size:11.5px;color:var(--t3);font-weight:600;margin-left:18px">'+L('dashboard.top3hits','appeared in top-3')+'</div>';
    }
    h += '</div>';
  });

  // Helper for prize pill — block-level, centered, fills its grid cell
  function fourdPill(num) {
    return '<span style="display:flex;align-items:center;justify-content:center;padding:9px 0;border-radius:6px;background:var(--bg);border:1px solid var(--bd);font-family:var(--mo);font-weight:700;font-size:16px;color:var(--tx);letter-spacing:.04em">'+num+'</span>';
  }

  // Starter Prizes — clean 5 × 2 grid
  h += '<div style="margin-top:18px">';
  h += '<div style="font-size:12px;font-weight:700;color:var(--p);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">'+L('dashboard.starters','Starter Prizes')+'</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">';
  (f.starter_prizes || []).forEach(function(p){ h += fourdPill(p); });
  h += '</div></div>';

  // Consolation Prizes — same 5 × 2 grid
  h += '<div style="margin-top:18px">';
  h += '<div style="font-size:12px;font-weight:700;color:var(--vi);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">'+L('dashboard.consolation','Consolation Prizes')+'</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">';
  (f.consolation_prizes || []).forEach(function(p){ h += fourdPill(p); });
  h += '</div></div>';

  h += '</div>';   // close 4D card
  h += '</div>';   // close g2 grid

  // (TOTO Stats freq mini-chart removed per request — full stats live in TOTO Stats tab)
  return h;
}

  h += '<p style="font-size:13px;color:var(--t2);margin:0 0 14px">'+L('toto.festivalDesc','Look at just one event type. Are there numbers that show up more often in CNY Hongbao draws vs cascade draws vs regular?')+'</p>';

  return h;

window.loadDatePattern = function() {
  var dv = document.getElementById('datePatternD').value;
  if (!dv) { alert('Pick a date'); return; }
  var md = dv.slice(5);    // YYYY-MM-DD → MM-DD
  var out = document.getElementById('datePatternResult');
  out.innerHTML = loadingCard();
  fetch('/api/toto/date-pattern?month_day=' + md).then(r=>r.json()).then(function(j) {
    if (!j.success) { out.innerHTML = 'Error: '+(j.error||''); return; }
    var d = j.data;
    var html = '';
    html += '<div style="font-size:13px;color:var(--t2);margin-bottom:14px;padding:10px 14px;background:var(--bg);border-radius:6px">';
    html += '<b>'+md+'</b> across all years &nbsp;·&nbsp; <b>'+d.draws_on_date+' TOTO draws</b> happened on this date';
    if (d.draws_on_date < 5) {
      html += ' <span style="color:var(--red)">— too few draws for meaningful patterns</span>';
    }
    html += '</div>';
    if (d.draws_on_date === 0) {
      html += '<p style="font-size:12.5px;color:var(--t3)">No TOTO draws on this date in our archive.</p>';
    } else {
      html += '<div class="grid g2" style="gap:18px">';
      [['Most often on this date', d.top_numbers, 'var(--red)'],
       ['Least often on this date', d.bottom_numbers, 'var(--cy)']
      ].forEach(function(sec) {
        html += '<div><div style="font-size:12px;font-weight:800;color:'+sec[2]+';text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+sec[0]+'</div>';
        html += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
        sec[1].forEach(function(n){
          html += '<div style="display:flex;flex-direction:column;align-items:center;gap:4px">'+
            makeBall(n.number, 36, sec[2], 0)+
            '<span style="font-size:11px;color:var(--t3);font-weight:600;font-family:var(--mo)">'+n.count+'×</span>'+
            '</div>';
        });
        html += '</div></div>';
      });
      html += '</div>';
    }
    out.innerHTML = html;
  });
};

window.loadNumberDetail = function() {
  var n = parseInt(document.getElementById('ndN').value, 10);
  if (!n || n < 1 || n > 49) { alert('Pick a number 1 to 49'); return; }

  fetch('/api/toto/number-detail?n=' + n).then(r=>r.json()).then(function(j) {
    if (!j.success) { out.innerHTML = 'Error: '+(j.error||''); return; }
    var d = j.data;
    var html = '';
    // Header: ball + headline stats
    html += '<div style="display:flex;align-items:center;gap:18px;margin-bottom:18px;flex-wrap:wrap">';
    html += makeBall(d.number, 56, "var(--p)", 0);
    html += '<div style="flex:1;min-width:200px"><div style="font-size:22px;font-weight:800;color:var(--tx)">appeared <span style="color:var(--p);font-family:var(--mo)">'+d.appearances+'×</span></div>';
    html += '<div style="font-size:13px;color:var(--t2)">in '+d.total_draws_scanned+' draws since Oct 2014</div></div>';
    html += '</div>';
    // 4 KPI tiles
    html += '<div class="grid g4" style="gap:10px;margin-bottom:16px;grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">';
    [['First seen', d.first_appearance ? d.first_appearance.draw_date : '—'],
     ['Last seen', d.last_appearance ? d.last_appearance.draw_date : '—'],
     ['Current gap', d.current_gap + ' draws ago'],
     ['Longest gap', d.longest_gap + ' draws']
    ].forEach(function(k) {
      html += '<div style="padding:12px;background:var(--bg);border-radius:8px"><div style="font-size:10.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">'+k[0]+'</div><div style="font-size:14px;font-weight:700;color:var(--tx);font-family:var(--mo)">'+k[1]+'</div></div>';
    });
    html += '</div>';
    // Day-of-week comparison — all 7 days side-by-side
    if (d.by_dow && d.by_dow.length) {
      var maxDow = Math.max.apply(null, d.by_dow.map(x=>x.count));
      var bestDow = d.best_dow ? d.best_dow.name : '';
      html += '<div style="font-size:12px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Day-of-Week Breakdown';
      if (bestDow) html += ' &nbsp;<span style="font-size:11px;color:var(--vi);font-weight:600;text-transform:none;letter-spacing:0">— best: '+bestDow+'</span>';
      html += '</div>';
      html += '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:18px">';
      d.by_dow.forEach(function(x) {
        var pct = maxDow > 0 ? x.count / maxDow * 100 : 0;
        var isBest = bestDow === x.day && x.count > 0;
        var barCol = isBest ? 'var(--vi)' : (x.count === 0 ? 'var(--bd)' : 'var(--p)');
        html += '<div style="display:flex;align-items:center;gap:10px">';
        html += '<div style="font-size:12px;font-weight:'+(isBest?800:600)+';color:'+(isBest?'var(--vi)':'var(--t2)')+';min-width:50px">'+x.day+'</div>';
        html += '<div style="flex:1;height:16px;background:var(--bg);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+barCol+';border-radius:4px"></div></div>';
        html += '<div style="font-family:var(--mo);font-size:12.5px;font-weight:700;color:'+(isBest?'var(--vi)':'var(--t2)')+';min-width:40px;text-align:right">'+x.count+'×</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    // Best month pill (kept compact)
    if (d.best_month) {
      html += '<div style="padding:14px;background:rgba(220,38,38,.08);border-radius:8px;margin-bottom:18px"><div style="font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Best Month</div><div style="font-size:18px;font-weight:800;color:var(--red)">'+d.best_month.name+' &nbsp;<span style="font-size:13px;color:var(--t2);font-weight:600">('+d.best_month.count+'×)</span></div></div>';
    }
    // Yearly breakdown
    if (d.by_year && d.by_year.length) {
      var maxYear = Math.max.apply(null, d.by_year.map(y=>y.count));
      html += '<div style="font-size:12px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Yearly breakdown</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px">';
      d.by_year.forEach(function(y) {
        var pct = maxYear > 0 ? y.count / maxYear * 100 : 0;
        html += '<div style="padding:8px 10px;background:var(--bg);border-radius:6px">';
        html += '<div style="font-size:12px;font-weight:700;color:var(--tx)">'+y.year+'</div>';
        html += '<div style="height:8px;background:var(--bl);border-radius:3px;overflow:hidden;margin:4px 0"><div style="height:100%;width:'+pct+'%;background:var(--p);border-radius:3px"></div></div>';
        html += '<div style="font-size:12px;color:var(--t2);font-weight:600">'+y.count+'×</div>';
        html += '</div>';
      });
      html += '</div>';
    }
    out.innerHTML = html;
  });
};

function loadDigitHeatmap() {
  var el = document.getElementById('digitHeatmap'); if (!el) return;
  fetch('/api/fourd/digit-positions').then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var m = j.data.matrix;
    var expected = j.data.expected_per_cell;
    var html = '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px;font-family:var(--mo)">';
    html += '<thead><tr><th style="text-align:left;padding:6px 8px;font-weight:800;color:var(--t3)">Position</th>';
    for (var d = 0; d < 10; d++) html += '<th style="padding:6px 8px;text-align:center;font-weight:800;color:var(--t3)">'+d+'</th>';
    html += '</tr></thead><tbody>';
    var posLabels = ['1st digit','2nd digit','3rd digit','4th digit'];
    for (var pos = 0; pos < 4; pos++) {
      html += '<tr style="border-top:1px solid var(--bl)">';
      html += '<td style="padding:8px;color:var(--t2);font-weight:700">'+posLabels[pos]+'</td>';
      for (var d = 0; d < 10; d++) {
        var c = m[pos][d];
        var ratio = c / expected;
        // Background intensity: darker = more frequent (relative to expected)
        var alpha = Math.min(0.5, Math.max(0.05, (ratio - 0.8) * 1.5));
        var color = ratio >= 1 ? 'rgba(220,38,38,'+alpha+')' : 'rgba(8,145,178,'+alpha+')';
        html += '<td style="padding:8px;text-align:center;background:'+color+'">'+c+'</td>';
      }
      html += '</tr>';
    }
    html += '</tbody></table></div>';
    html += '<div style="font-size:11.5px;color:var(--t3);margin-top:10px">Expected per cell if uniform: ~'+expected+'. Cells redder = above expected, bluer = below.</div>';
    el.innerHTML = html;
  });
}

function loadClassByYear() {
  var el = document.getElementById('classByYear'); if (!el) return;
  fetch('/api/fourd/class-by-year').then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var overall = j.data.overall;

    // Helper to render one digit-frequency table sorted by appearance %
    function digitTable(map, expected, fmt) {
      var arr = [];
      for (var d = 0; d <= 9; d++) arr.push({ d: d, c: map[d].count, p: map[d].pct });
      arr.sort(function(a,b){ return b.p - a.p; });
      var max = arr[0].p || 1;
      var html = '<div style="display:flex;flex-direction:column;gap:5px">';
      arr.forEach(function(x, idx) {
        var dev = x.p - expected;
        var devPct = expected > 0 ? (dev / expected * 100) : 0;
        var col = Math.abs(dev) < expected * 0.05 ? 'var(--t2)' : (dev > 0 ? '#dc2626' : '#0891b2');
        var w = max > 0 ? (x.p / max * 100) : 0;
        var rankCol = idx === 0 ? '#dc2626' : (idx === arr.length - 1 ? '#0891b2' : 'var(--t3)');
        var sign = dev >= 0 ? '+' : '';
        html += '<div style="display:flex;align-items:center;gap:8px;padding:4px 8px;background:'+(idx===0?'rgba(220,38,38,.05)':idx===arr.length-1?'rgba(8,145,178,.05)':'transparent')+';border-radius:6px">';
        html += '<span style="font-family:var(--mo);color:'+rankCol+';font-size:10px;font-weight:800;min-width:14px">'+(idx+1)+'</span>';
        html += '<span style="font-family:var(--mo);font-weight:800;color:var(--tx);font-size:14px;min-width:44px">'+fmt(x.d)+'</span>';
        html += '<div style="flex:1;height:8px;background:var(--cd);border-radius:2px;overflow:hidden;min-width:40px"><div style="height:100%;width:'+w+'%;background:'+col+';border-radius:2px"></div></div>';
        html += '<span style="font-family:var(--mo);font-weight:700;color:'+col+';font-size:12px;min-width:54px;text-align:right">'+x.p+'%</span>';
        html += '<span style="font-family:var(--mo);color:'+col+';font-size:10.5px;font-weight:600;min-width:42px;text-align:right">'+sign+devPct.toFixed(1)+'%</span>';
        html += '<span style="font-family:var(--mo);color:var(--t3);font-size:10.5px;min-width:62px;text-align:right">'+x.c.toLocaleString()+'×</span>';
        html += '</div>';
      });
      html += '</div>';
      var topD = arr[0], botD = arr[arr.length - 1];
      html += '<div style="font-size:11px;color:var(--t3);margin-top:8px;padding-top:8px;border-top:1px solid var(--bl);line-height:1.5">';
      html += L('fourd.expectedRandom','Expected <b>{pct}%</b> each if random.').replace('{pct}', expected)+'<br>';
      html += '<span style="color:#dc2626">'+L('fourd.hottestColon','Hottest:')+' <b style="font-family:var(--mo)">'+fmt(topD.d)+'</b> ('+topD.p+'%)</span> · ';
      html += '<span style="color:#0891b2">'+L('fourd.coldestColon','Coldest:')+' <b style="font-family:var(--mo)">'+fmt(botD.d)+'</b> ('+botD.p+'%)</span>';
      html += '</div>';
      return html;
    }

    // === Single overall card — compact 4-column grid ===
    var html = '<div style="padding:18px;background:linear-gradient(135deg,rgba(55,48,163,.06),rgba(8,145,178,.06));border-radius:10px">';
    html += '<div style="display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:14px">';
    html += '<span style="font-size:13px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.05em">'+L('fourd.digitOverall','{from}–{to} Overall').replace('{from}', overall.year_range.from).replace('{to}', overall.year_range.to)+'</span>';
    html += '<span style="font-size:12.5px;color:var(--t2);font-family:var(--mo)">'+L('fourd.digitOverallStats','{draws} draws · {prizes} prize numbers · {digits} digits scanned').replace('{draws}', overall.total_draws.toLocaleString()).replace('{prizes}', overall.total_prizes.toLocaleString()).replace('{digits}', overall.total_digits.toLocaleString())+'</span>';
    html += '</div>';
    html += '<div style="display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px;font-size:12.5px">';
    html += '<div><span style="color:var(--t3);font-weight:600">'+L('fourd.digitNone','None:')+'</span> <b style="font-family:var(--mo);color:var(--tx)">'+overall.none_pct+'%</b></div>';
    html += '<div><span style="color:var(--t3);font-weight:600">'+L('fourd.digitDouble','Double:')+'</span> <b style="font-family:var(--mo);color:var(--cy)">'+overall.double_pct+'%</b></div>';
    html += '<div><span style="color:var(--t3);font-weight:600">'+L('fourd.digitTriple','Triple:')+'</span> <b style="font-family:var(--mo);color:var(--amb)">'+overall.triple_pct+'%</b></div>';
    html += '<div><span style="color:var(--t3);font-weight:600">'+L('fourd.digitQuad','Quad:')+'</span> <b style="font-family:var(--mo);color:var(--red)">'+overall.quad_pct+'%</b></div>';
    html += '</div>';
    // 4 compact frequency tables, side by side
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px">';
    html += '<div><div style="font-size:11.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">'+L('fourd.digitSingle','Single digit')+'</div>'+digitTable(overall.digit_pct, 10, function(d){return d;})+'</div>';
    html += '<div><div style="font-size:11.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">'+L('fourd.digitDoubleXX','Double XX')+'</div>'+digitTable(overall.double_pct_per_digit, 4.83, function(d){return ''+d+d;})+'</div>';
    html += '<div><div style="font-size:11.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">'+L('fourd.digitTripleXXX','Triple XXX')+'</div>'+digitTable(overall.triple_pct_per_digit, 0.36, function(d){return ''+d+d+d;})+'</div>';
    html += '<div><div style="font-size:11.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">'+L('fourd.digitQuadXXXX','Quad XXXX')+'</div>'+digitTable(overall.quad_pct_per_digit, 0.01, function(d){return ''+d+d+d+d;})+'</div>';
    html += '</div>';
    html += '</div>';

    el.innerHTML = html;
  });
}

function loadDryDistribution() {
  var el = document.getElementById('dryDist'); if (!el) return;
  fetch('/api/fourd/dry-distribution').then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data;
    var html = '';
    html += '<div style="padding:10px 14px;background:var(--bg);border-radius:6px;font-size:13px;color:var(--t2);margin-bottom:14px">';
    html += '<b>'+d.total_gaps_analyzed.toLocaleString()+'</b> gap-events analyzed (top-3 qualifying universe) · '+d.bucket_size+'-draw buckets · <b>'+d.profitable_buckets.length+'</b> buckets with +ROI ≥ 5 hits';
    html += '</div>';

    // === Chart: ROI per bucket ===
    var bk = d.buckets.filter(function(b){ return b.hits >= 3; });   // skip very tiny buckets in viz
    var maxAbsROI = Math.max.apply(null, bk.map(function(b){return Math.abs(b.roi);}));
    var maxHazard = Math.max.apply(null, bk.map(function(b){return b.hazard_rate_pct;}));
    html += '<div style="font-size:11.5px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">ROI per bucket — green = profitable, red = loss</div>';
    html += '<div style="position:relative;overflow-x:auto;border-radius:6px;background:linear-gradient(180deg,rgba(5,150,105,.02) 0%,transparent 50%,rgba(220,38,38,.02) 100%);padding:8px">';
    html += '<div style="display:flex;align-items:center;gap:2px;height:200px;position:relative;border-top:1px dashed var(--bd);border-bottom:1px dashed var(--bd)">';
    html += '<div style="position:absolute;left:0;right:0;top:50%;height:1px;background:var(--bd);z-index:1"></div>';
    bk.forEach(function(b) {
      var roiPct = b.roi;
      // bar grows up for positive, down for negative
      var hPos = roiPct > 0 ? Math.min(100, (roiPct / maxAbsROI) * 50) : 0;
      var hNeg = roiPct < 0 ? Math.min(100, (Math.abs(roiPct) / maxAbsROI) * 50) : 0;
      var col = roiPct > 0 ? '#059669' : '#dc2626';
      var sampleWarning = b.hits < 30 ? ' opacity:0.5;' : '';
      html += '<div style="min-width:30px;display:flex;flex-direction:column;align-items:center;height:100%;position:relative;'+sampleWarning+'" title="'+b.bucket_start+'-'+b.bucket_end+': '+b.hits+' hits, '+b.hazard_rate_pct+'% hazard, ROI '+b.roi+'%">';
      html += '<div style="position:absolute;top:50%;width:100%;transform:translateY(-100%);height:'+hPos+'%;background:'+col+';min-height:1px"></div>';
      html += '<div style="position:absolute;top:50%;width:100%;height:'+hNeg+'%;background:'+col+';min-height:1px"></div>';
      html += '</div>';
    });
    html += '</div>';
    // X-axis labels (every 5th bucket)
    html += '<div style="display:flex;gap:2px;margin-top:6px">';
    bk.forEach(function(b, i) {
      var lbl = (i % 5 === 0) ? b.bucket_start : '';
      html += '<div style="min-width:30px;font-family:var(--mo);font-size:9.5px;color:var(--t3);text-align:center">'+lbl+'</div>';
    });
    html += '</div></div>';
    html += '<div style="font-size:11px;color:var(--t3);margin-top:6px;font-style:italic">Bars at 50% center = ROI 0%. Faded bars = small samples (&lt;30 hits). Hover for details.</div>';

    // === Profitable buckets table ===
    html += '<div style="font-size:13px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.05em;margin:18px 0 10px">Profitable buckets (where to bet)</div>';
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:18px">';
    html += '<thead><tr style="border-bottom:1px solid var(--bd);color:var(--t3);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em">';
    ['Bucket','Hits','Survivors','Hazard','Avg payout','Top-3 %','Cost','Revenue','Net','ROI','vs Random'].forEach(function(c, i) {
      html += '<th style="padding:6px 8px;text-align:'+(i<=0?'left':'right')+';font-weight:800">'+c+'</th>';
    });
    html += '</tr></thead><tbody>';
    d.profitable_buckets.forEach(function(b) {
      var sampleFlag = b.hits < 30 ? ' ⚠' : '';
      var bg = b.hits >= 30 ? 'rgba(5,150,105,.06)' : 'rgba(217,119,6,.04)';
      html += '<tr style="border-bottom:1px solid var(--bl);background:'+bg+'">';
      html += '<td style="padding:6px 8px;font-family:var(--mo);font-weight:800;color:var(--p)">'+b.bucket_start+'-'+b.bucket_end+sampleFlag+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--em);font-weight:700">'+b.hits+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3)">'+b.survivors_past+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t2)">'+b.hazard_rate_pct+'%</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t2)">$'+b.avg_payout+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:'+(b.top3_pct>13?'var(--em)':'var(--t2)')+';font-weight:700">'+b.top3_pct+'%</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3);font-size:11.5px">$'+b.total_cost.toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t2);font-size:11.5px">$'+b.total_revenue.toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:800;color:var(--em)">+$'+b.profit.toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:800;color:var(--em)">+'+b.roi+'%</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--em);font-size:11.5px">+'+b.vs_random_pp+'pp</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    html += '<div style="font-size:11.5px;color:var(--t3);font-style:italic;margin-bottom:18px">⚠ = small sample (&lt;30 hits) — high variance, treat as suggestive not proven.</div>';

    // === Pattern comparison ===
    var p = d.patterns;
    html += '<div style="font-size:13px;font-weight:800;color:var(--vi);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Pattern comparison: profitable zone vs typical</div>';
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">';
    html += '<thead><tr style="border-bottom:1px solid var(--bd);color:var(--t3);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em">';
    ['Pattern','Profitable Zone (1900-2400)','Typical Zone (100-500)','All Hits (baseline)','Signal?'].forEach(function(c, i) {
      html += '<th style="padding:7px 10px;text-align:'+(i===0?'left':'center')+';font-weight:800">'+c+'</th>';
    });
    html += '</tr></thead><tbody>';
    function row(label, prof, typ, base, sig) {
      var sigCol = sig === 'STRONG' ? '#dc2626' : sig === 'mild' ? '#d97706' : 'var(--t3)';
      return '<tr style="border-bottom:1px solid var(--bl)">'+
        '<td style="padding:7px 10px;font-weight:600;color:var(--tx)">'+label+'</td>'+
        '<td style="padding:7px 10px;text-align:center;font-family:var(--mo);font-weight:'+(sig?800:600)+';color:'+(sig?sigCol:'var(--tx)')+'">'+prof+'</td>'+
        '<td style="padding:7px 10px;text-align:center;font-family:var(--mo);color:var(--t2)">'+typ+'</td>'+
        '<td style="padding:7px 10px;text-align:center;font-family:var(--mo);color:var(--t3)">'+base+'</td>'+
        '<td style="padding:7px 10px;text-align:center;font-family:var(--mo);font-weight:800;color:'+sigCol+'">'+(sig||'noise')+'</td>'+
        '</tr>';
    }
    html += row('Sample size (n)', p.profitable_zone.n, p.typical_zone.n, p.baseline.n, null);
    html += row('Top-3 prize rate', p.profitable_zone.top3_pct+'%', p.typical_zone.top3_pct+'%', p.baseline.top3_pct+'%', 'STRONG');
    html += row('1st prize rate', p.profitable_zone.tier_pct.first+'%', p.typical_zone.tier_pct.first+'%', p.baseline.tier_pct.first+'%', 'mild');
    html += row('Starter rate', p.profitable_zone.tier_pct.starter+'%', p.typical_zone.tier_pct.starter+'%', p.baseline.tier_pct.starter+'%', null);
    html += row('Consolation rate', p.profitable_zone.tier_pct.consol+'%', p.typical_zone.tier_pct.consol+'%', p.baseline.tier_pct.consol+'%', null);
    // Digit-7 specifically
    var dig7 = function(zone) { return zone.digit_freq.find(function(d){return d.digit===7;}).pct + '%'; };
    html += row('Digit 7 frequency', dig7(p.profitable_zone), dig7(p.typical_zone), dig7(p.baseline), 'mild');
    html += '</tbody></table></div>';
    html += '<div style="margin-top:14px;padding:12px 14px;background:rgba(5,150,105,.06);border-left:3px solid var(--em);border-radius:6px;font-size:12.5px;color:var(--t2);line-height:1.7">';
    html += '<b style="color:var(--em)">Headline pattern:</b> In the profitable zone (1900-2400 draws dry), <b>top-3 prize rate jumps to '+p.profitable_zone.top3_pct+'%</b> vs '+p.baseline.top3_pct+'% baseline. That\'s a <b>'+((p.profitable_zone.top3_pct/p.baseline.top3_pct).toFixed(1))+'× lift</b>. Numbers that resolve from extreme dry spells favor bigger payouts — that\'s the entire mechanism behind why bounded windows in this range turn positive.';
    html += '</div>';

    el.innerHTML = html;
  });
}

window.loadBoundedWindow = function() {
  var el = document.getElementById('boundedWindow'); if (!el) return;
  el.innerHTML = loadingCard();
  var start = parseInt(document.getElementById('bwStart').value) || 1800;
  var stop = parseInt(document.getElementById('bwStop').value) || 2150;
  fetch('/api/fourd/bounded-window?start='+start+'&stop='+stop).then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data;
    var u = d.user_pick, best = d.best;
    var TIER = { first:{c:'#059669',l:'1st'}, second:{c:'#ea580c',l:'2nd'}, third:{c:'#2563eb',l:'3rd'}, starter:{c:'#4b5563',l:'Start'}, consol:{c:'#0f172a',l:'Cons'} };
    var html = '';

    // === User pick result ===
    var uCol = u.profit >= 0 ? 'var(--em)' : 'var(--red)';
    var uLiftCol = u.vs_random_pp > 0 ? 'var(--em)' : 'var(--red)';
    html += '<div style="padding:18px;background:'+(u.profit>=0?'rgba(5,150,105,.08)':'rgba(217,119,6,.06)')+';border-left:4px solid '+uCol+';border-radius:8px;margin-bottom:14px">';
    html += '<div style="font-size:11.5px;font-weight:800;color:'+uCol+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Your config: start '+u.start+' → stop '+u.stop+' (max $'+u.max_per_segment+'/segment)</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px">';
    function tile(label, val, col, sub) {
      return '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">'+label+'</div><div style="font-family:var(--mo);font-size:18px;font-weight:800;color:'+col+'">'+val+'</div>'+(sub?'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+sub+'</div>':'')+'</div>';
    }
    html += tile('Net P/L', (u.profit>=0?'+$':'-$')+Math.abs(u.profit).toLocaleString(), uCol, u.roi+'% ROI');
    html += tile('Wins in window', u.wins.toLocaleString(), 'var(--em)', u.win_rate+'% win rate');
    html += tile('Abandons', u.abandons.toLocaleString(), 'var(--red)', 'spent $'+u.max_per_segment+' each');
    html += tile('Total cost', '$'+u.totalCost.toLocaleString(), 'var(--tx)');
    html += tile('Total revenue', '$'+u.revenue.toLocaleString(), 'var(--tx)');
    html += tile('vs Random', (u.vs_random_pp>=0?'+':'')+u.vs_random_pp+'pp', uLiftCol, 'random = -34.1%');
    html += tile('Active now', u.openBets, 'var(--amb)', u.openAbandons+' past stop');
    html += '</div>';
    var t = u.tier_breakdown;
    html += '<div style="margin-top:10px;font-size:12px;color:var(--t2)"><b>Tier wins:</b> ';
    Object.keys(TIER).forEach(function(k){ html += '<span style="color:'+TIER[k].c+';font-weight:700;margin-right:10px">'+TIER[k].l+': '+t[k]+'</span>'; });
    html += '</div></div>';

    // === Optimal config recommendation ===
    if (best.profit > 0 && (best.start !== u.start || best.stop !== u.stop)) {
      html += '<div style="padding:14px;background:rgba(5,150,105,.10);border-left:3px solid var(--em);border-radius:6px;margin-bottom:14px;font-size:12.5px;color:var(--t2)"><b style="color:var(--em)">💡 Best window found in grid search:</b> start <b style="font-family:var(--mo)">'+best.start+'</b> → stop <b style="font-family:var(--mo)">'+best.stop+'</b> (max $'+best.max_per_segment+'/seg) → ROI <b style="font-family:var(--mo);color:var(--em)">+'+best.roi+'%</b> (<b>+$'+best.profit.toLocaleString()+' net</b>, '+best.wins+' wins / '+best.abandons+' abandons, +'+best.vs_random_pp+'pp over random). Adjust the inputs above to try it.</div>';
    }

    // === Positive ROI strategies ===
    if (d.grid_positive.length > 0) {
      html += '<div style="font-size:13px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+d.grid_positive.length+' POSITIVE-ROI windows found</div>';
      html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:18px">';
      html += '<thead><tr style="border-bottom:1px solid var(--bd);color:var(--t3);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em">';
      ['Start','Stop','Max $','Wins','Abandons','Win %','Cost','Revenue','Net','ROI','Lift'].forEach(function(c, i) {
        html += '<th style="padding:6px 8px;text-align:'+(i<=1?'left':'right')+';font-weight:800">'+c+'</th>';
      });
      html += '</tr></thead><tbody>';
      d.grid_positive.forEach(function(r) {
        html += '<tr style="border-bottom:1px solid var(--bl);background:rgba(5,150,105,.04)">';
        html += '<td style="padding:6px 8px;font-family:var(--mo);font-weight:700;color:var(--p)">'+r.start+'</td>';
        html += '<td style="padding:6px 8px;font-family:var(--mo);font-weight:700;color:var(--p)">'+r.stop+'</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t2)">$'+r.max_per_segment+'</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--em);font-weight:700">'+r.wins+'</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3)">'+r.abandons+'</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t2)">'+r.win_rate+'%</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3)">$'+r.totalCost.toLocaleString()+'</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t2)">$'+r.revenue.toLocaleString()+'</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:800;color:var(--em)">+$'+r.profit.toLocaleString()+'</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:800;color:var(--em)">+'+r.roi+'%</td>';
        html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--em);font-size:11.5px">+'+r.vs_random_pp+'pp</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    }

    // === Year-by-year breakdown for user pick ===
    if (u.yearly && u.yearly.length) {
      html += '<div style="font-size:13px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Year-by-year (your config)</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:6px;margin-bottom:18px;font-family:var(--mo)">';
      u.yearly.forEach(function(y) {
        var col = y.net >= 0 ? 'var(--em)' : 'var(--red)';

        html += '<div style="padding:8px 10px;background:'+bg+';border-radius:6px;border-left:3px solid '+col+'">';
        html += '<div style="font-size:13px;font-weight:800;color:var(--p)">'+y.year+'</div>';
        html += '<div style="font-size:14px;font-weight:800;color:'+col+'">'+(y.net>=0?'+$':'-$')+Math.abs(y.net)+'</div>';
        html += '<div style="font-size:10px;color:var(--t3)">'+y.wins+'W · '+y.abandons+'A</div>';
        html += '</div>';
      });
      html += '</div>';
    }

    // === Currently actionable ===
    var ca = d.currently_actionable;
    html += '<div style="font-size:13px;font-weight:800;color:var(--amb);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Currently in your '+u.start+'-'+u.stop+' window ('+ca.length+' numbers)</div>';

      html += '<div style="font-size:12.5px;color:var(--t3);font-style:italic">No numbers currently match this window. Try a different range.</div>';
    } else {
      html += '<div style="font-size:12px;color:var(--t3);margin-bottom:10px;font-style:italic">These numbers are top-3 capable AND in your active bet window today. Sorted by draws remaining before abandonment.</div>';
      ca.slice(0, 25).forEach(function(x, i) {
        html += '<div style="padding:10px 14px;background:var(--bg);border-left:3px solid var(--amb);border-radius:6px;margin-bottom:6px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">';
        html += '<span style="font-family:var(--mo);font-size:13px;font-weight:800;color:var(--amb);min-width:30px">#'+(i+1)+'</span>';
        html += '<span style="font-family:var(--mo);font-size:22px;font-weight:800;color:var(--tx);min-width:80px">'+x.number+'</span>';

        html += '<span style="font-size:11.5px;color:var(--t3)">last hit '+x.last_hit_date+' ('+(TIER[x.last_hit_tier]||{}).l+')</span>';

    el.innerHTML = html;

  var el = document.getElementById('top3DrySweep'); if (!el) return;
  fetch('/api/fourd/top3-dry-sweep').then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data;
    var b = d.best;
    var baseline = -d.house_edge_pct;
    var liftCol = b.vs_random_pp > 5 ? 'var(--em)' : b.vs_random_pp > 0 ? '#16a34a' : 'var(--red)';
    var html = '';
    // === Best banner ===
    html += '<div style="padding:18px;background:rgba(55,48,163,.06);border-left:4px solid var(--p);border-radius:8px;margin-bottom:14px">';
    html += '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px">';
    html += '<div style="font-size:11.5px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.06em">Optimal threshold</div>';
    html += '<span style="font-family:var(--mo);font-size:24px;font-weight:800;color:var(--p)">'+b.threshold+' draws</span>';
    html += '<span style="font-size:12.5px;color:var(--t3)">≈ '+(b.threshold/156).toFixed(1)+' years</span>';
    html += '<span style="margin-left:auto;font-family:var(--mo);font-size:18px;font-weight:800;color:'+(b.profit>=0?'var(--em)':'var(--red)')+'">'+b.roi_pct+'% ROI</span>';
    html += '<span style="font-family:var(--mo);font-size:15px;font-weight:800;color:'+liftCol+'">vs random: '+(b.vs_random_pp>=0?'+':'')+b.vs_random_pp+'pp</span>';
    html += '</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;font-size:12.5px">';
    html += '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase">Cost</div><b style="font-family:var(--mo);color:var(--tx);font-size:15px">$'+b.totalCost.toLocaleString()+'</b></div>';
    html += '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase">Revenue</div><b style="font-family:var(--mo);color:var(--tx);font-size:15px">$'+b.revenue.toLocaleString()+'</b></div>';
    html += '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase">Net</div><b style="font-family:var(--mo);color:'+(b.profit>=0?'var(--em)':'var(--red)')+';font-size:15px">'+(b.profit>=0?'+$':'-$')+Math.abs(b.profit).toLocaleString()+'</b></div>';
    html += '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase">Completed bets</div><b style="font-family:var(--mo);color:var(--tx);font-size:15px">'+b.completed.toLocaleString()+'</b></div>';
    html += '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase">Open bets</div><b style="font-family:var(--mo);color:var(--amb);font-size:15px">'+b.openBets+'</b></div>';
    html += '</div>';
    var t = b.tier_breakdown;
    html += '<div style="margin-top:10px;font-size:12px;color:var(--t2)"><b>Tier wins:</b> ';
    html += '<span style="color:#059669;font-weight:700">1st: '+t.first+'</span> · ';
    html += '<span style="color:#ea580c;font-weight:700">2nd: '+t.second+'</span> · ';
    html += '<span style="color:#2563eb;font-weight:700">3rd: '+t.third+'</span> · ';
    html += '<span style="color:#4b5563;font-weight:700">Starter: '+t.starter+'</span> · ';
    html += '<span style="color:#0f172a;font-weight:700">Consolation: '+t.consol+'</span>';
    html += '</div>';
    if (b.profit < 0) {
      html += '<div style="margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:12px;color:var(--t2);font-style:italic"><b style="color:var(--red);font-style:normal">Honest:</b> still loses money in absolute terms (-'+Math.abs(b.roi_pct)+'% ROI), but does much better than random (-'+d.house_edge_pct+'%). The filter <b>does</b> work — but not enough to overcome the house edge. Useful as risk reduction, not profit.</div>';
    }
    // Show unreliable headline if different
    var unrel = d.best_overall_unreliable;
    if (unrel && unrel.threshold !== b.threshold) {
      var unrelLift = unrel.vs_random_pp;
      html += '<div style="margin-top:8px;padding:8px 12px;background:rgba(217,119,6,.08);border-left:3px solid var(--amb);border-radius:6px;font-size:11.5px;color:var(--t2)"><b style="color:var(--amb)">⚠ Higher ROI exists at threshold '+unrel.threshold+' draws ('+(unrel.threshold/156).toFixed(1)+'y) → ROI '+unrel.roi_pct+'% ('+(unrelLift>=0?'+':'')+unrelLift+'pp lift), BUT only '+unrel.completed+' completed bet runs — too small to trust. Reported "optimal" above requires ≥100 runs for statistical reliability.</div>';
    }
    html += '</div>';

    // === Distribution histogram ===
    var dist = d.distribution;
    html += '<div style="font-size:13px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Distribution of longest-dry streaks across '+dist.n.toLocaleString()+' qualifying numbers</div>';
    html += '<div style="font-size:12px;color:var(--t2);margin-bottom:14px">Each bar = how many numbers had a maximum dry streak in that bucket. Mean = <b style="color:#dc2626">'+dist.mean+'d</b> (~'+(dist.mean/156).toFixed(1)+'y) · Median = <b style="color:#d97706">'+dist.median+'d</b> · p90 = <b style="color:#7c3aed">'+dist.p90+'d</b> · Max = <b style="color:#0f172a">'+dist.max+'d</b> (~'+(dist.max/156).toFixed(1)+'y). The edge appears only above p90 (~12y dry).</div>';
    var maxBucketCount = Math.max.apply(null, d.histogram.map(function(b){return b.count;}));
    html += '<div style="position:relative;display:flex;align-items:flex-end;gap:2px;height:180px;padding:6px 0;background:linear-gradient(180deg,transparent,rgba(55,48,163,.04));border-radius:6px;margin-bottom:10px;overflow-x:auto">';
    d.histogram.forEach(function(b) {
      if (b.count === 0 && b.bucket_start > dist.max) return;
      var ht = maxBucketCount > 0 ? (b.count / maxBucketCount * 100) : 0;
      var col = '#3730a3';
      if (b.bucket_start <= dist.median && (b.bucket_start + 200) > dist.median) col = '#d97706';
      else if (b.bucket_start <= dist.mean && (b.bucket_start + 200) > dist.mean) col = '#dc2626';
      else if (b.bucket_start <= dist.p90 && (b.bucket_start + 200) > dist.p90) col = '#7c3aed';
      else if (b.bucket_start >= dist.p90) col = '#7c3aed';
      else if (b.bucket_start >= dist.p75) col = '#16a34a';
      html += '<div style="min-width:32px;display:flex;flex-direction:column;align-items:center;gap:3px">';
      html += '<div style="font-size:9.5px;color:var(--t3);font-family:var(--mo)">'+b.count+'</div>';
      html += '<div style="width:100%;height:'+ht+'%;background:'+col+';border-radius:3px 3px 0 0;min-height:1px" title="'+b.bucket_start+'-'+b.bucket_end+' draws: '+b.count+' numbers"></div>';
      html += '<div style="font-size:9px;color:var(--t3);font-family:var(--mo);transform:rotate(-40deg);transform-origin:top right;white-space:nowrap;margin-top:5px">'+b.bucket_start+'</div>';
      html += '</div>';
    });
    html += '</div>';
    // Legend
    html += '<div style="display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--t2);margin-bottom:14px">';
    html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#3730a3;vertical-align:middle;margin-right:4px"></span>Typical range</span>';
    html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#16a34a;vertical-align:middle;margin-right:4px"></span>p75-p90 (above-average)</span>';
    html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#7c3aed;vertical-align:middle;margin-right:4px"></span>p90+ (edge zone)</span>';
    html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#d97706;vertical-align:middle;margin-right:4px"></span>median ('+dist.median+'d)</span>';
    html += '<span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#dc2626;vertical-align:middle;margin-right:4px"></span>mean ('+dist.mean+'d)</span>';
    html += '</div>';

    // === Sweep table ===
    html += '<div style="font-size:13px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Full threshold sweep</div>';
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">';
    html += '<thead><tr style="border-bottom:1px solid var(--bd);color:var(--t3);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em">';
    ['Threshold','In yrs','Completed','Open','Cost','Revenue','Net','ROI','vs Random'].forEach(function(c, i) {
      var align = i === 0 ? 'left' : 'right';
      html += '<th style="padding:6px 8px;text-align:'+align+';font-weight:800">'+c+'</th>';
    });
    html += '</tr></thead><tbody>';
    d.sweep.forEach(function(r) {
      if (r.totalCost === 0) return;
      var pCol = r.profit >= 0 ? '#059669' : 'var(--t2)';
      var liftCol = r.vs_random_pp > 5 ? '#059669' : r.vs_random_pp > 0 ? '#16a34a' : '#dc2626';
      var isBest = r.threshold === b.threshold;
      var bg = isBest ? 'rgba(55,48,163,.08)' : '';
      html += '<tr style="border-bottom:1px solid var(--bl);background:'+bg+'">';
      html += '<td style="padding:6px 8px;font-family:var(--mo);font-weight:'+(isBest?800:600)+';color:'+(isBest?'var(--p)':'var(--tx)')+'">'+r.threshold+(isBest?' <span style="font-size:10px">★</span>':'')+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3);font-size:11.5px">'+(r.threshold/156).toFixed(1)+'y</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t2)">'+r.completed+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--amb);font-size:11.5px">'+r.openBets+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3);font-size:11.5px">$'+r.totalCost.toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3);font-size:11.5px">$'+r.revenue.toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:700;color:'+pCol+'">'+(r.profit>=0?'+$':'-$')+Math.abs(r.profit).toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:800;color:'+liftCol+'">'+r.roi_pct+'%</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:700;color:'+liftCol+';font-size:11.5px">'+(r.vs_random_pp>=0?'+':'')+r.vs_random_pp+'pp</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';

    // === Currently actionable ===
    var ca = d.currently_actionable;
    html += '<div style="font-size:13px;font-weight:800;color:var(--amb);text-transform:uppercase;letter-spacing:.05em;margin:24px 0 10px">Currently actionable @ '+ca.threshold_used+' threshold</div>';
    html += '<div style="font-size:12.5px;color:var(--t2);margin-bottom:10px">';
    html += '<b>'+ca.count+'</b> numbers are top-3 qualified AND currently dry ≥ '+ca.threshold_used+' draws. At the optimal threshold, the backtest says you\'d bet on these today (showing top 25).';
    html += '</div>';
    var TC = { first:'#059669', second:'#ea580c', third:'#2563eb', starter:'#4b5563', consol:'#0f172a' };
    ca.list.forEach(function(x, i) {
      html += '<div style="display:flex;align-items:center;gap:14px;padding:10px 14px;background:var(--bg);border-left:3px solid var(--amb);border-radius:6px;margin-bottom:6px;flex-wrap:wrap">';
      html += '<span style="font-family:var(--mo);font-size:13px;font-weight:800;color:var(--amb);min-width:30px">#'+(i+1)+'</span>';
      html += '<span style="font-family:var(--mo);font-size:22px;font-weight:800;color:var(--tx);min-width:80px">'+x.number+'</span>';
      html += '<span style="font-family:var(--mo);font-size:13px;font-weight:700;color:var(--amb)">dry '+x.current_gap+' draws (~'+x.current_gap_years+'y)</span>';
      html += '<div style="display:flex;gap:6px;font-family:var(--mo);font-size:12.5px;font-weight:700;margin-left:auto">';
      ['first','second','third','starter','consol'].forEach(function(k) {
        if (x.tiers[k] > 0) html += '<span style="color:'+TC[k]+'">'+k.slice(0,3).replace('sta','S').replace('con','C').replace('fir','1st').replace('sec','2nd').replace('thi','3rd')+':'+x.tiers[k]+'</span>';
      });
      html += '<span style="color:var(--t3);font-size:11.5px;margin-left:10px">'+x.total_lifetime_hits+' total</span>';
      html += '</div></div>';
    });

    el.innerHTML = html;
  });
}

function loadStrategySweep() {
  var el = document.getElementById('strategySweep'); if (!el) return;
  fetch('/api/fourd/h1-h2-multi-test').then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data;
    var baseline = -d.house_edge_pct;
    var best = d.best_variants.filter(function(r){ return r.years_tested > 0; })[0];
    var html = '';
    // === Winner banner ===
    if (best) {
      var liftVsRandom = (best.roi_pct - baseline).toFixed(1);
      var liftCol = best.roi_pct > baseline ? 'var(--em)' : 'var(--red)';
      html += '<div style="padding:18px;background:rgba(5,150,105,.08);border-left:4px solid var(--em);border-radius:8px;margin-bottom:14px">';
      html += '<div style="font-size:11.5px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Best variant</div>';
      html += '<div style="display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;margin-bottom:10px">';
      html += '<span style="font-family:var(--mo);font-size:22px;font-weight:800;color:var(--tx)">'+best.name+'</span>';
      html += '<span style="font-family:var(--mo);font-size:22px;font-weight:800;color:'+(best.roi_pct>=0?'var(--em)':'var(--red)')+'">'+best.roi_pct+'% ROI</span>';
      html += '<span style="font-family:var(--mo);font-size:14px;font-weight:800;color:'+liftCol+'">vs random: '+(parseFloat(liftVsRandom)>0?'+':'')+liftVsRandom+'pp '+(parseFloat(liftVsRandom)>0?'better':'worse')+'</span>';
      html += '</div>';
      html += '<div style="font-size:12.5px;color:var(--t2);line-height:1.6">';
      html += 'Over '+best.years_tested+' years: bet $'+best.total_cost.toLocaleString()+', got back $'+best.total_revenue.toLocaleString()+', net '+(best.net_profit>=0?'+$':'-$')+Math.abs(best.net_profit).toLocaleString()+'. Profitable in '+best.profitable_years+' / '+best.years_tested+' years. ';
      if (best.roi_pct > baseline + 5) {
        html += '<b style="color:var(--em)">Beats the house-edge baseline by '+liftVsRandom+'pp</b> — the filter is doing real work, even though the absolute return is still negative.';
      } else {
        html += 'Within noise of random expectation.';
      }
      html += '</div>';
      html += '<div style="margin-top:10px;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:11.5px;color:var(--t2);font-style:italic"><b>⚠ Multiple-testing caveat:</b> we tested '+d.strategy_grid_size+' variants, so 2-3 false-positive "winners" are expected by pure chance. The 23pp lift here is suggestive but n=39 yearly trials is small. Don\'t treat as proven edge — it\'s still a money-losing strategy in absolute terms.</div>';
      html += '</div>';
    }
    // === Full table sortable ===
    html += '<div style="font-size:13px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">All '+d.strategy_grid_size+' variants (sorted by ROI)</div>';
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">';
    html += '<thead><tr style="border-bottom:1px solid var(--bd);color:var(--t3);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em">';
    ['Strategy','Avg qual/yr','Profit yrs','Cost','Revenue','Net','ROI','vs Random'].forEach(function(c, i) {
      var align = i === 0 ? 'left' : 'right';
      html += '<th style="padding:7px 8px;text-align:'+align+';font-weight:800">'+c+'</th>';
    });
    html += '</tr></thead><tbody>';
    d.all_results.forEach(function(r) {
      if (r.years_tested === 0) return;
      var lift = r.roi_pct - baseline;
      var liftCol = lift > 5 ? '#059669' : lift > 0 ? '#16a34a' : lift > -5 ? 'var(--t2)' : '#dc2626';
      var pCol = r.net_profit >= 0 ? '#059669' : 'var(--t2)';
      var isBest = r === best;
      var bg = isBest ? 'rgba(5,150,105,.08)' : '';
      html += '<tr style="border-bottom:1px solid var(--bl);background:'+bg+'">';
      html += '<td style="padding:6px 8px;font-family:var(--mo);font-weight:'+(isBest?800:600)+';color:'+(isBest?'var(--em)':'var(--tx)')+'">'+r.name+(isBest?' <span style="font-size:10px">★</span>':'')+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t2)">'+r.avg_qualifying_per_year+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3);font-size:11.5px">'+r.profitable_years+'/'+r.years_tested+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3);font-size:11.5px">$'+r.total_cost.toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);color:var(--t3);font-size:11.5px">$'+r.total_revenue.toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:700;color:'+pCol+'">'+(r.net_profit>=0?'+$':'-$')+Math.abs(r.net_profit).toLocaleString()+'</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:800;color:'+(r.roi_pct>=baseline?liftCol:'var(--red)')+'">'+r.roi_pct+'%</td>';
      html += '<td style="padding:6px 8px;text-align:right;font-family:var(--mo);font-weight:700;color:'+liftCol+';font-size:11.5px">'+(lift>0?'+':'')+lift.toFixed(1)+'pp</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    el.innerHTML = html;
  });
}

function loadH1H2Backtest() {
  var el = document.getElementById('h1h2Backtest'); if (!el) return;
  fetch('/api/fourd/h1-to-h2-backtest').then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data, a = d.aggregate;
    var profitCol = a.total_profit >= 0 ? 'var(--em)' : 'var(--red)';
    var randomCol = a.vs_random >= 0 ? 'var(--em)' : 'var(--red)';
    var html = '';
    // === Verdict box ===
    html += '<div style="padding:18px;background:'+(a.total_profit>=0?'rgba(5,150,105,.08)':'rgba(220,38,38,.08)')+';border-left:4px solid '+profitCol+';border-radius:8px;margin-bottom:14px">';
    html += '<div style="font-size:11.5px;font-weight:800;color:'+profitCol+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Strategy verdict</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px">';
    function tile(label, val, col, sub) {
      return '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">'+label+'</div><div style="font-family:var(--mo);font-size:20px;font-weight:800;color:'+col+'">'+val+'</div>'+(sub?'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+sub+'</div>':'')+'</div>';
    }
    html += tile('Net P/L', (a.total_profit>=0?'+$':'-$')+Math.abs(a.total_profit).toLocaleString(), profitCol, a.overall_roi_pct+'% ROI');
    html += tile('Total cost', '$'+a.total_cost.toLocaleString(), 'var(--tx)', a.years_tested+' years tested');
    html += tile('Total revenue', '$'+a.total_revenue.toLocaleString(), 'var(--tx)', a.total_hits.toLocaleString()+' prize hits');
    html += tile('Avg qualifying #/yr', a.avg_qualifying_per_year, 'var(--tx)', a.total_qualifying_numbers+' total');
    html += tile('vs. Random baseline', (a.vs_random>=0?'+$':'-$')+Math.abs(a.vs_random).toLocaleString(), randomCol, 'random expected -'+a.house_edge_pct+'%');
    html += tile('Profitable years', a.profitable_years+'/'+a.years_tested, a.profitable_years > a.years_tested/2 ? 'var(--em)' : 'var(--red)', Math.round(a.profitable_years/a.years_tested*100)+'%');
    html += '</div>';
    if (a.total_profit < 0) {
      html += '<div style="margin-top:12px;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:12.5px;color:var(--t2)"><b style="color:var(--red)">⚠ Honest finding:</b> the strategy lost <b>$'+Math.abs(a.total_profit).toLocaleString()+'</b> (' + a.overall_roi_pct + '% ROI)';
      if (a.vs_random < 0) html += ', which is <b>worse than the random house-edge baseline of -' + a.house_edge_pct + '%</b>';
      html += '. Only ' + a.profitable_years + ' out of ' + a.years_tested + ' years were profitable. 1st-prize winners in H1 are not "hot" — they don\'t cluster a second hit. Picking them just creates a focused random portfolio.</div>';
    }
    html += '</div>';

    // === Year-by-year table ===
    html += '<div style="font-size:13px;font-weight:800;color:var(--vi);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Year-by-Year</div>';
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:13px">';
    html += '<thead><tr style="border-bottom:1px solid var(--bd);color:var(--t3);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em">';

  });

window.loadDryBacktest = function() {
  var el = document.getElementById('dryBacktest'); if (!el) return;
  var sel = document.getElementById('dryThresh');
  var t = sel ? sel.value : 90;
  el.innerHTML = loadingCard();
  fetch('/api/fourd/dry-spell-backtest?threshold='+t).then(r=>r.json()).then(function(j) {
    if (!j.success) { el.innerHTML = 'Error'; return; }
    var d = j.data, a = d.aggregate;
    var TIER = {first:'1st',second:'2nd',third:'3rd',starter:'Start',consol:'Cons'};
    var profitCol = a.total_profit >= 0 ? 'var(--em)' : 'var(--red)';
    var html = '';
    // === Aggregate verdict box ===
    html += '<div style="padding:18px;background:'+(a.total_profit>=0?'rgba(5,150,105,.08)':'rgba(220,38,38,.08)')+';border-left:4px solid '+profitCol+';border-radius:8px;margin-bottom:14px">';
    html += '<div style="font-size:11.5px;font-weight:800;color:'+profitCol+';text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Strategy verdict at '+d.threshold_pct+'% trigger</div>';
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px">';
    function tile(label, val, col, sub) {
      return '<div><div style="font-size:10.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">'+label+'</div><div style="font-family:var(--mo);font-size:20px;font-weight:800;color:'+col+'">'+val+'</div>'+(sub?'<div style="font-size:11px;color:var(--t3);margin-top:2px">'+sub+'</div>':'')+'</div>';
    }
    html += tile('Net P/L', (a.total_profit>=0?'+$':'-$')+Math.abs(a.total_profit).toLocaleString(), profitCol);
    html += tile('Total cost', '$'+a.total_cost.toLocaleString(), 'var(--tx)', 'over '+a.total_bet_runs.toLocaleString()+' bet runs');
    html += tile('Total revenue', '$'+a.total_revenue.toLocaleString(), 'var(--tx)');
    html += tile('Win rate', a.win_rate_pct+'%', a.win_rate_pct >= 50 ? 'var(--em)' : 'var(--red)', a.total_wins.toLocaleString()+' / '+a.total_bet_runs.toLocaleString());
    html += tile('Numbers tested', a.numbers_tested.toLocaleString(), 'var(--tx)');
    html += tile('Profitable nums', a.profitable_numbers.toLocaleString(), 'var(--em)', Math.round(a.profitable_numbers/a.numbers_tested*100)+'%');
    html += tile('Losing nums', a.losing_numbers.toLocaleString(), 'var(--red)', Math.round(a.losing_numbers/a.numbers_tested*100)+'%');
    html += tile('Avg per number', (a.avg_profit_per_number>=0?'+$':'-$')+Math.abs(a.avg_profit_per_number), profitCol);
    html += '</div>';
    if (a.total_profit < 0) {
      html += '<div style="margin-top:12px;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:12.5px;color:var(--t2)"><b style="color:var(--red)">⚠ Honest finding:</b> the strategy lost <b>$'+Math.abs(a.total_profit).toLocaleString()+'</b> across the full archive. The win rate of '+a.win_rate_pct+'% (well below 50%) confirms the lottery is <b>memoryless</b> — a long dry spell does not increase the probability of an imminent hit. The few numbers that profited are statistical noise, not pattern detection.</div>';
    } else {
      html += '<div style="margin-top:12px;padding:10px 12px;background:var(--bg);border-radius:6px;font-size:12.5px;color:var(--t2)"><b style="color:var(--em)">⚡ Unusual result:</b> the strategy was net positive. Check sample size and win-rate distribution before trusting — could still be variance with few large hits.</div>';
    }
    html += '</div>';

    function renderRow(x, rank, accent) {
      var pCol = x.total_profit >= 0 ? 'var(--em)' : 'var(--red)';
      var thr = Math.floor(x.longest_dry * d.threshold_pct / 100);
      var html = '<div style="padding:12px 14px;background:var(--bg);border-left:3px solid '+accent+';border-radius:6px;margin-bottom:8px">';
      html += '<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px">';
      html += '<span style="font-family:var(--mo);font-size:14px;font-weight:800;color:'+accent+';min-width:28px">#'+rank+'</span>';
      html += '<span style="font-family:var(--mo);font-size:22px;font-weight:800;color:var(--tx);min-width:80px">'+x.number+'</span>';
      html += '<span style="font-size:12px;color:var(--t3)">longest dry <b style="font-family:var(--mo);color:var(--t2)">'+x.longest_dry+'</b> · trigger at <b style="font-family:var(--mo);color:var(--t2)">'+thr+'</b></span>';
      html += '<span style="font-size:12px;color:var(--t3)">'+x.bet_runs+' bet runs · '+x.win_rate_pct+'% win</span>';
      html += '<span style="font-size:12px;color:var(--t3)">spent <b style="font-family:var(--mo);color:var(--t2)">$'+x.total_cost.toLocaleString()+'</b> · earned <b style="font-family:var(--mo);color:var(--t2)">$'+x.total_revenue.toLocaleString()+'</b></span>';
      html += '<span style="margin-left:auto;font-family:var(--mo);font-size:16px;font-weight:800;color:'+pCol+'">'+(x.total_profit>=0?'+$':'-$')+Math.abs(x.total_profit).toLocaleString()+'</span>';
      html += '</div>';
      if (x.currently_betting) {
        html += '<div style="font-size:11.5px;color:var(--amb);font-weight:700">⏱ Currently in bet run: '+x.draws_bet_open+' draws bet since trigger (current gap '+x.current_gap+'). Last hit '+x.last_hit_date+' ('+TIER[x.last_hit_tier]+').</div>';
      }
      html += '</div>';
      return html;
    }

    // === CURRENTLY ACTIONABLE — most useful for live betting decisions ===
    if (d.currently_actionable && d.currently_actionable.length) {
      html += '<div style="font-size:13px;font-weight:800;color:var(--amb);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Currently in bet zone (right now)</div>';
      html += '<div style="font-size:12px;color:var(--t3);margin-bottom:10px;font-style:italic">These numbers\' current gap has already crossed the '+d.threshold_pct+'% threshold. The backtest says you\'d be betting on them today. Most have historical positive profit — but that\'s past performance, not a guarantee.</div>';
      d.currently_actionable.forEach(function(x, i) { html += renderRow(x, i+1, 'var(--amb)'); });
    } else {
      html += '<div style="padding:14px;background:var(--bg);border-radius:6px;font-size:12.5px;color:var(--t3);margin-bottom:14px;font-style:italic">No numbers currently in active bet zone at this threshold.</div>';
    }

    // === TOP WINNERS (historical, with caveat) ===
    html += '<div style="font-size:13px;font-weight:800;color:var(--em);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px">Historical top winners (warning: small samples)</div>';
    html += '<div style="font-size:12px;color:var(--t3);margin-bottom:10px;font-style:italic">These would have been profitable IF you ran the strategy on them. But with only 3-7 bet runs each, the "100% win rate" is more luck than pattern.</div>';
    d.top_winners.forEach(function(x, i) { html += renderRow(x, i+1, 'var(--em)'); });

    // === TOP LOSERS ===
    html += '<div style="font-size:13px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 8px">Worst losers — strategy would have bled cash</div>';
    d.top_losers.forEach(function(x, i) { html += renderRow(x, i+1, 'var(--red)'); });

    el.innerHTML = html;
  });
};

function loadYearlyRegulars() {

      html += '<span style="font-family:var(--mo);font-size:15px;font-weight:800;color:'+covCol+'">'+x.years_hit+'/'+d.total_years+' '+L('fourd.yrsLabel','yrs')+' ('+x.year_coverage_pct+'%)</span>';

      html += '<span style="color:var(--t3)">'+L('fourd.longestDrought','longest drought')+' <b style="font-family:var(--mo);color:'+droughtCol+';font-size:14px">'+x.longest_drought+'y</b></span>';
      html += '<span style="color:var(--t3)">'+L('fourd.avgGap','avg gap')+' <b style="font-family:var(--mo);color:var(--t2);font-size:14px">'+x.avg_year_gap+'y</b></span>';
      html += '<span style="color:var(--t3)">'+L('fourd.recent5y','recent 5y')+' <b style="font-family:var(--mo);color:'+recentCol+';font-size:14px">'+x.recent_5y_coverage+'/5</b></span>';
      html += '<span style="color:var(--t3)">'+L('fourd.recent10y','recent 10y')+' <b style="font-family:var(--mo);color:var(--em);font-size:14px">'+x.recent_10y_coverage+'/10</b></span>';
      html += '<span style="color:var(--t3)">'+L('fourd.sinceLast','since last')+' <b style="font-family:var(--mo);color:'+(x.years_since_last_hit<=1?'#059669':x.years_since_last_hit<=3?'#d97706':'#dc2626')+';font-size:14px">'+x.years_since_last_hit+'y</b></span>';
      html += '<span style="margin-left:auto;color:var(--t3)">'+x.total_hits+' '+L('fourd.totalHits','total hits')+'</span>';
      html += '</div>';
      // Tier chips — shown for BOTH direct 4D and iBet
      html += '<div style="display:flex;gap:8px;flex-wrap:wrap;font-family:var(--mo);font-size:13px;font-weight:700;margin-bottom:6px">';

        html += '<span style="color:'+col+';opacity:'+op+'">'+t.label+':<b style="margin-left:3px">'+n+'</b></span>';
      });
      html += '</div>';
      // iBet rows also show example perms below the chips
      if (isIbet) {
        html += '<div style="font-size:11.5px;color:var(--t3);font-family:var(--mo);margin-bottom:4px">example perms: '+x.example_perms.join(' · ')+'</div>';
      }
      // Year strip — each year cell shows the hit count only (tier breakdown on hover)
      var pyb = x.per_year_breakdown || {};
      html += '<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:8px;font-family:var(--mo)">';
      for (var y = d.year_range.from; y <= d.year_range.to; y++) {

        var cellBg = hit ? '#3730a3' : 'transparent';
        var cellBorder = hit ? '1px solid #3730a3' : '1px solid var(--bl)';
        var titleStr = hit
          ? y+': '+yb.total+' hit'+(yb.total!==1?'s':'')+' ('+yb.first+'×1st, '+yb.second+'×2nd, '+yb.third+'×3rd, '+yb.starter+'×starter, '+yb.consol+'×consol)'

        html += '<div style="font-size:9.5px;font-weight:700;color:'+(hit?'#fff':'var(--t3)')+'">'+(''+y).slice(-2)+'</div>';
        if (hit) {
          html += '<div style="font-size:10px;font-weight:800;color:#fff;margin-top:1px">'+yb.total+'×</div>';
        } else {
          html += '<div style="font-size:9px;color:var(--t3);opacity:.4;margin-top:1px">·</div>';
        }
        html += '</div>';
      }
      html += '</div>';
      html += '</div>';
      return html;
    }
    var html = '';
    html += '<div style="padding:10px 14px;background:var(--bg);border-radius:6px;font-size:13px;color:var(--t2);margin-bottom:14px">';
    html += L('fourd.acrossYears','Across <b>{yrs} years ({from}-{to})</b>: <b>{direct}</b> direct-4D candidates with ≥10 hits; <b>{ibet}</b> iBet sets with ≥20 hits.')
            .replace('{yrs}', d.total_years).replace('{from}', d.year_range.from).replace('{to}', d.year_range.to)
            .replace('{direct}', d.direct_4d.total_candidates.toLocaleString()).replace('{ibet}', d.ibet.total_candidates.toLocaleString());
    html += '</div>';
    // Direct 4D section
    html += '<div style="font-size:13px;font-weight:800;color:var(--p);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">'+L('fourd.directBestRegulars','Direct 4D — best year-over-year regulars')+'</div>';
    d.direct_4d.most_consistent.forEach(function(x, i) { html += renderRow(x, i+1, false); });
    // iBet section
    html += '<div style="font-size:13px;font-weight:800;color:var(--vi);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 10px">'+L('fourd.ibetBestRegulars','iBet — best year-over-year regulars')+'</div>';
    html += '<div style="font-size:12px;color:var(--t3);margin-bottom:10px;font-style:italic">All top iBet sets hit nearly every year, but profit is usually negative due to perm-division. Use this list to see <b>which digit-sets to avoid for iBet</b>.</div>';
    d.ibet.most_consistent.forEach(function(x, i) { html += renderRow(x, i+1, true); });
    el.innerHTML = html;
  });
}
