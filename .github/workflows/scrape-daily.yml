name: Auto scrape (TOTO + 4D, event-driven)

on:
  schedule:
    # Draw window — every 5 min, 6:00–11:55pm SGT (10:00–15:55 UTC).
    # Covers the 6.30pm draws plus delayed big draws. auto.js is page-driven
    # (reads SP's own "Next Draw" date/time) so it self-decides whether to act.
    - cron: '*/5 10-15 * * *'
    # Safety net — twice an hour, all day — for odd-time special draws and to
    # backfill anything missed. Each run is a fast no-op when already caught up.
    - cron: '17,47 * * * *'
  workflow_dispatch:          # manual trigger from the Actions tab

permissions:
  contents: write             # bot commits + pushes the updated DB

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Page-driven: reads latest published draw + SP's "Next Draw" date for
      # both games, backfills any gap (gap ≥ 1), refreshes the sentinel.
      - name: Auto scrape (TOTO + 4D)
        run: node scraper/auto.js --once

      # Push new results to the Telegram channel the moment they land.
      # No-op until TELEGRAM_* secrets exist; state lives in the DB so it is
      # committed below and each draw notifies exactly once across runs.
      - name: Notify Telegram channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scraper/notify-telegram.js || true

      # Commit ONLY when the DB actually changed (a new draw, or the next-draw
      # sentinel advanced). The sentinel is change-detecting, so idle ticks are
      # no-ops and never commit.
      - name: Commit & push if updated
        run: |
          git config user.name  "Huatlottery Bot"
          git config user.email "bot@huatlottery.local"
          git add huatlottery.db
          if git diff --staged --quiet; then
            echo "No change — nothing to commit."
          else
            TOTO=$(sqlite3 huatlottery.db "SELECT COUNT(*) FROM toto_draws")
            FOURD=$(sqlite3 huatlottery.db "SELECT COUNT(*) FROM fourd_draws")
            git commit -m "chore(scrape): $(date -u +%Y-%m-%dT%H:%MZ) — 4D=${FOURD} TOTO=${TOTO}"
            git push
          fi
