name: Weekly AI predictions

on:
  schedule:
    # Sunday 10:00 PM SGT (14:00 UTC) — picks ready by Monday morning visitors
    - cron: '0 14 * * 0'
  workflow_dispatch:          # Allow manual trigger via Actions tab

permissions:
  contents: write             # Bot commits + pushes the DB update

concurrency:
  group: predictions
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No pip cache: we install 4 wheels with --no-cache-dir, so caching saves
          # nothing — and there's no requirements file to key it, which made the
          # "Post Setup Python" cache-save step fail every run (false failure alerts).

      - name: Install production deps only (no jupyter/matplotlib)
        run: pip install --no-cache-dir numpy pandas scipy pyarrow

      - name: Generate weekly picks
        run: python -m analysis.serve

      - name: Commit and push if DB updated
        run: |
          git config user.name  "Huatlottery Bot"
          git config user.email "bot@huatlottery.local"
          # Resilient push: the scrape Action and the local poller also push the
          # binary DB to main. On a non-fast-forward reject, sync to latest main and
          # regenerate (serve is deterministic per week), then retry — so a push race
          # can never fail the run.
          for attempt in 1 2 3; do
            git add huatlottery.db
            if git diff --staged --quiet; then echo "No new picks — DB unchanged."; exit 0; fi
            git commit -m "chore(predictions): weekly auto-update $(date -u +%Y-%m-%d)"
            if git push; then echo "pushed (attempt ${attempt})"; exit 0; fi
            echo "push rejected — syncing to latest main + regenerating (attempt ${attempt})"
            git fetch origin && git reset --hard origin/main
            python -m analysis.serve
          done
          echo "::error::could not push predictions after 3 attempts"; exit 1
